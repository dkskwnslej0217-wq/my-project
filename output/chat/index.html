<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA — AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000008;font-family:'Orbitron',sans-serif;overflow:hidden;}

/* 배경 별 캔버스 */
#bg{position:fixed;inset:0;z-index:0;}

/* 레이아웃 */
#app{position:relative;z-index:10;display:flex;flex-direction:column;height:100vh;}

/* 헤더 */
#header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.8rem 1.4rem;border-bottom:1px solid rgba(139,92,246,.12);
  background:rgba(0,0,8,.7);backdrop-filter:blur(12px);flex-shrink:0;
}
#header-left{display:flex;align-items:center;gap:.8rem;}
#nova-orb{width:32px;height:32px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#c4b5fd,#7c3aed,#312e81);
  box-shadow:0 0 16px rgba(139,92,246,.6);flex-shrink:0;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 16px rgba(139,92,246,.6);}50%{box-shadow:0 0 28px rgba(167,139,250,.9),0 0 50px rgba(109,40,217,.4);}}
#header-title{font-size:.65rem;font-weight:900;letter-spacing:.3em;color:#fff;
  text-shadow:0 0 20px #7c3aed;}
#header-sub{font-size:.35rem;letter-spacing:.3em;color:rgba(167,139,250,.5);margin-top:2px;}
#user-info{font-size:.38rem;letter-spacing:.15em;color:rgba(167,139,250,.6);}
#back-btn{font-size:.36rem;letter-spacing:.2em;color:rgba(139,92,246,.5);
  text-decoration:none;border:1px solid rgba(139,92,246,.2);border-radius:6px;
  padding:.28rem .6rem;transition:color .2s,border-color .2s;}
#back-btn:hover{color:#c4b5fd;border-color:#8b5cf6;}

/* 메시지 영역 */
#messages{flex:1;overflow-y:auto;padding:1.2rem 1.4rem;display:flex;flex-direction:column;gap:.8rem;}
#messages::-webkit-scrollbar{width:3px;}
#messages::-webkit-scrollbar-track{background:transparent;}
#messages::-webkit-scrollbar-thumb{background:rgba(139,92,246,.3);border-radius:2px;}

/* 메시지 버블 */
.msg{display:flex;gap:.6rem;align-items:flex-start;max-width:75%;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;margin-top:2px;}
.msg-avatar.nova{background:radial-gradient(circle at 35% 35%,#c4b5fd,#7c3aed,#312e81);
  box-shadow:0 0 10px rgba(139,92,246,.5);}
.msg-avatar.user{background:rgba(139,92,246,.3);border:1px solid rgba(139,92,246,.4);}
.msg-bubble{padding:.6rem .85rem;border-radius:12px;font-size:.48rem;line-height:1.8;
  letter-spacing:.04em;}
.msg.nova .msg-bubble{background:rgba(109,40,217,.18);border:1px solid rgba(139,92,246,.18);
  color:rgba(255,255,255,.88);border-top-left-radius:2px;}
.msg.user .msg-bubble{background:rgba(139,92,246,.25);border:1px solid rgba(167,139,250,.25);
  color:#fff;border-top-right-radius:2px;}

/* 타이핑 인디케이터 */
#typing{display:none;align-items:center;gap:.5rem;padding:.4rem 0;}
#typing.show{display:flex;}
.dot{width:5px;height:5px;border-radius:50%;background:#8b5cf6;animation:blink 1.4s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

/* 입력창 */
#input-area{
  padding:.8rem 1.4rem;border-top:1px solid rgba(139,92,246,.1);
  background:rgba(0,0,8,.7);backdrop-filter:blur(12px);flex-shrink:0;
}
#input-row{display:flex;gap:.6rem;align-items:flex-end;}
#input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(139,92,246,.25);
  border-radius:12px;color:#fff;font-family:'Orbitron',sans-serif;
  font-size:.48rem;letter-spacing:.05em;padding:.6rem .9rem;
  outline:none;resize:none;max-height:100px;transition:border-color .2s;line-height:1.6;}
#input:focus{border-color:rgba(167,139,250,.5);}
#input::placeholder{color:rgba(255,255,255,.2);}
#send-btn{background:linear-gradient(135deg,#5b21b6,#7c3aed);border:none;
  border-radius:10px;width:38px;height:38px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:opacity .2s;box-shadow:0 0 14px rgba(109,40,217,.4);}
#send-btn:hover{opacity:.85;}
#send-btn:disabled{opacity:.3;cursor:not-allowed;}
#send-btn svg{width:16px;height:16px;fill:#fff;}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="app">
  <div id="header">
    <div id="header-left">
      <div id="nova-orb"></div>
      <div>
        <div id="header-title">NOVA</div>
        <div id="header-sub">AI ASSISTANT</div>
      </div>
    </div>
    <div id="user-info"></div>
    <a href="/" id="back-btn">← UNIVERSE</a>
  </div>

  <div id="messages">
    <div class="msg nova">
      <div class="msg-avatar nova"></div>
      <div class="msg-bubble">안녕하세요. 저는 NOVA입니다.<br>무엇이든 물어보세요.</div>
    </div>
  </div>

  <div id="typing">
    <div class="msg-avatar nova" style="width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c4b5fd,#7c3aed,#312e81);"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="input" placeholder="NOVA에게 물어보세요..." rows="1"></textarea>
      <button id="send-btn" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// ─── 배경 별 ─────────────────────────────────────────
(function(){
  const c=document.getElementById('bg');
  const ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const stars=Array.from({length:600},()=>({
    x:Math.random()*c.width,y:Math.random()*c.height,
    r:Math.random()*.8,a:Math.random()*.6
  }));
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=.002*(Math.random()>.5?1:-1);
      s.a=Math.max(.05,Math.min(.6,s.a));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,160,255,${s.a})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

// ─── 유저 정보 ───────────────────────────────────────
const urlId=new URLSearchParams(location.search).get('id');
const stored=localStorage.getItem('nova_user');
let currentUser=null;
if(stored){try{currentUser=JSON.parse(stored);}catch{}}
if(currentUser) document.getElementById('user-info').textContent='✦ '+currentUser.nickname;

// ─── 채팅 ────────────────────────────────────────────
const messagesEl=document.getElementById('messages');
const inputEl=document.getElementById('input');
const sendBtn=document.getElementById('send-btn');
const typingEl=document.getElementById('typing');
const history=[];

inputEl.addEventListener('input',()=>{
  sendBtn.disabled=!inputEl.value.trim();
  inputEl.style.height='auto';
  inputEl.style.height=Math.min(inputEl.scrollHeight,100)+'px';
});

inputEl.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!sendBtn.disabled)send();}
});
sendBtn.onclick=send;

function addMsg(role,text){
  const div=document.createElement('div');
  div.className='msg '+(role==='user'?'user':'nova');
  div.innerHTML=`<div class="msg-avatar ${role==='user'?'user':'nova'}"></div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop=messagesEl.scrollHeight;
}

async function send(){
  const text=inputEl.value.trim();
  if(!text)return;
  inputEl.value='';inputEl.style.height='auto';
  sendBtn.disabled=true;
  addMsg('user',text);
  history.push({role:'user',content:text});

  typingEl.classList.add('show');
  messagesEl.scrollTop=messagesEl.scrollHeight;

  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text,history:history.slice(-10)})
    });
    const data=await res.json();
    const reply=data.reply||data.content||'응답을 받지 못했어요.';
    history.push({role:'assistant',content:reply});
    typingEl.classList.remove('show');
    addMsg('nova',reply);
  }catch{
    typingEl.classList.remove('show');
    addMsg('nova','연결에 문제가 생겼어요. 잠시 후 다시 시도해주세요.');
  }
}
</script>
</body>
</html>
