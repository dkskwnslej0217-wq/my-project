<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA UNIVERSE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000005;font-family:'Orbitron',sans-serif}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}

/* 로딩 */
#loader{
  position:fixed;inset:0;z-index:200;background:#000005;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  transition:opacity 1.2s ease;
}
#loader-title{font-size:clamp(1.4rem,4vw,3rem);font-weight:900;letter-spacing:.3em;color:#fff;
  text-shadow:0 0 40px #6d28d9,0 0 80px #4338ca;}
#loader-sub{font-size:clamp(.4rem,.6vw,.6rem);letter-spacing:.6em;color:rgba(139,92,246,.4);margin-bottom:16px;}
#loader-lines{font-size:clamp(.4rem,.55vw,.56rem);letter-spacing:.2em;color:#8b5cf6;
  text-align:left;width:clamp(240px,35vw,360px);min-height:90px;line-height:2.1;}
#loader-lines div{opacity:0;transition:opacity .3s ease;}
#loader-bar-wrap{width:clamp(240px,35vw,360px);height:1px;background:rgba(139,92,246,.1);margin-top:8px;}
#loader-bar{height:100%;width:0%;background:linear-gradient(90deg,#4338ca,#8b5cf6,#c084fc);
  transition:width .35s ease;box-shadow:0 0 6px #7c3aed;}

/* 로고 — 좌상단 작게 */
#logo{
  position:fixed;top:20px;left:28px;z-index:20;pointer-events:none;
  opacity:0;transition:opacity 1s ease;
}
#logo-title{font-size:clamp(.7rem,1.1vw,.95rem);font-weight:900;letter-spacing:.25em;color:rgba(255,255,255,.75);
  text-shadow:0 0 20px #7c3aed;}
#logo-sub{font-size:clamp(.3rem,.42vw,.38rem);letter-spacing:.5em;color:rgba(139,92,246,.4);margin-top:2px;}

/* 힌트 — 하단 중앙, 아주 작게 */
#hint{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:20;
  font-size:clamp(.32rem,.45vw,.42rem);letter-spacing:.25em;color:rgba(255,255,255,.12);
  pointer-events:none;opacity:0;transition:opacity 1s ease;
}

/* 검색창 */
#search-wrap{
  position:fixed;bottom:55px;left:50%;transform:translateX(-50%);z-index:20;
  display:flex;align-items:center;gap:8px;
  opacity:0;transition:opacity 1s ease;
}
#search-input{
  background:rgba(4,0,18,.88);border:1px solid rgba(139,92,246,.2);
  border-radius:20px;color:#fff;font-family:'Orbitron',sans-serif;
  font-size:.38rem;letter-spacing:.12em;padding:.38rem 1rem;
  outline:none;width:170px;transition:border-color .2s,width .3s;
}
#search-input:focus{border-color:rgba(139,92,246,.5);width:210px;}
#search-input::placeholder{color:rgba(255,255,255,.18);}
#search-msg{font-family:'Orbitron',sans-serif;font-size:.36rem;
  letter-spacing:.1em;color:rgba(139,92,246,.6);white-space:nowrap;}

/* 행성 라벨 */
.planet-label{
  position:fixed;pointer-events:all;z-index:5;
  transform:translate(-50%,-50%);text-align:center;cursor:pointer;
}
.planet-label .name{
  font-size:clamp(.42rem,.6vw,.58rem);font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  text-shadow:0 0 12px currentColor;display:block;
  font-family:'Orbitron',sans-serif;transition:text-shadow .2s;
}
.planet-label:hover .name{text-shadow:0 0 24px currentColor,0 0 40px currentColor;}
.planet-label .tag{
  font-size:clamp(.28rem,.38vw,.36rem);
  color:rgba(255,255,255,.22);letter-spacing:.12em;
  font-family:'Orbitron',sans-serif;margin-top:3px;display:block;
}

/* 툴팁 */
#tooltip{
  position:fixed;z-index:50;pointer-events:none;
  background:rgba(4,0,18,0.96);
  border:1px solid rgba(139,92,246,0.25);
  border-radius:12px;padding:.8rem 1.1rem;
  font-family:'Orbitron',sans-serif;max-width:200px;display:none;
  box-shadow:0 0 30px rgba(109,40,217,.15);
}
#tooltip-name{font-size:.58rem;font-weight:700;color:#fff;letter-spacing:.1em;margin-bottom:.35rem;}
#tooltip-desc{font-size:.48rem;color:rgba(139,92,246,.65);line-height:1.8;letter-spacing:.04em;}

/* 워프 */
#warp{position:fixed;inset:0;z-index:100;pointer-events:none;
  background:radial-gradient(ellipse at center,#6d28d9 0%,#000 60%);
  opacity:0;transition:opacity .2s;}

/* 유저 패널 — 우상단 */
#user-panel{
  position:fixed;top:20px;right:24px;z-index:20;
  display:flex;align-items:center;gap:10px;
  opacity:0;transition:opacity 1s ease;font-family:'Orbitron',sans-serif;
}
#user-nickname{font-size:clamp(.38rem,.52vw,.48rem);letter-spacing:.18em;color:rgba(255,255,255,.65);}
#invite-wrap{display:none;align-items:center;gap:6px;}
#invite-link{background:rgba(255,255,255,.03);border:1px solid rgba(139,92,246,.18);
  border-radius:6px;color:rgba(139,92,246,.55);font-family:'Orbitron',sans-serif;
  font-size:.36rem;letter-spacing:.08em;padding:.28rem .45rem;width:150px;outline:none;}
#copy-btn{background:rgba(109,40,217,.25);border:1px solid rgba(139,92,246,.3);
  color:#c4b5fd;font-family:'Orbitron',sans-serif;font-size:.36rem;letter-spacing:.1em;
  padding:.28rem .55rem;border-radius:6px;cursor:pointer;white-space:nowrap;transition:background .2s;}
#copy-btn:hover{background:rgba(109,40,217,.5);}
#login-btn{font-family:'Orbitron',sans-serif;font-size:.4rem;letter-spacing:.2em;
  color:rgba(139,92,246,.55);text-decoration:none;
  border:1px solid rgba(139,92,246,.18);border-radius:6px;padding:.32rem .65rem;transition:color .2s,border-color .2s;}
#login-btn:hover{color:#c4b5fd;border-color:#8b5cf6;}

/* 피드백 버튼 */
#fb-btn{
  position:fixed;bottom:24px;right:24px;z-index:50;
  background:rgba(4,0,18,.85);border:1px solid rgba(139,92,246,.2);
  color:rgba(139,92,246,.5);font-family:'Orbitron',sans-serif;
  font-size:.42rem;letter-spacing:.18em;padding:.45rem .85rem;
  border-radius:20px;cursor:pointer;pointer-events:all;
  transition:border-color .2s,color .2s;
}
#fb-btn:hover{border-color:#8b5cf6;color:#c4b5fd;}

/* 피드백 모달 */
#fb-modal{display:none;position:fixed;inset:0;z-index:150;
  background:rgba(0,0,5,.85);align-items:center;justify-content:center;}
#fb-modal.open{display:flex;}
#fb-box{background:#060112;border:1px solid rgba(139,92,246,.25);
  border-radius:14px;padding:2rem;width:min(90vw,360px);font-family:'Orbitron',sans-serif;}
#fb-box h3{font-size:.65rem;letter-spacing:.2em;color:#fff;margin-bottom:1.2rem;}
#fb-issue{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(139,92,246,.18);
  border-radius:8px;color:#fff;font-family:'Orbitron',sans-serif;font-size:.5rem;
  letter-spacing:.07em;padding:.7rem;resize:none;height:80px;outline:none;margin-bottom:.7rem;}
#fb-cat{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(139,92,246,.18);
  border-radius:8px;color:#8b5cf6;font-family:'Orbitron',sans-serif;font-size:.5rem;
  letter-spacing:.07em;padding:.55rem;outline:none;margin-bottom:1.1rem;cursor:pointer;}
#fb-cat option{background:#060112;}
.fb-row{display:flex;gap:.6rem;}
.fb-btn-s{flex:1;padding:.55rem;border-radius:8px;font-family:'Orbitron',sans-serif;
  font-size:.44rem;letter-spacing:.12em;cursor:pointer;border:none;}
#fb-cancel{background:rgba(255,255,255,.05);color:rgba(139,92,246,.5);}
#fb-send{background:linear-gradient(135deg,#4338ca,#7c3aed);color:#fff;}
#fb-done{display:none;font-size:.5rem;letter-spacing:.1em;color:#8b5cf6;text-align:center;margin-top:.7rem;}
</style>
</head>
<body>

<div id="loader">
  <div id="loader-title">NOVA UNIVERSE</div>
  <div id="loader-sub">AI BUSINESS AUTOMATION</div>
  <div id="loader-lines"></div>
  <div id="loader-bar-wrap"><div id="loader-bar"></div></div>
</div>

<div id="warp"></div>

<div id="logo">
  <div id="logo-title">NOVA UNIVERSE</div>
  <div id="logo-sub">AI BUSINESS AUTOMATION</div>
</div>
<div id="hint">드래그로 우주를 탐험하세요</div>
<div id="search-wrap">
  <input id="search-input" type="text" placeholder="✦ 별 찾기..."/>
  <span id="search-msg"></span>
</div>

<div id="tooltip"><div id="tooltip-name"></div><div id="tooltip-desc"></div></div>

<div id="user-panel">
  <span id="user-nickname"></span>
  <div id="invite-wrap">
    <input id="invite-link" type="text" readonly/>
    <button id="copy-btn">SHARE ✦</button>
  </div>
</div>

<button id="fb-btn">FEEDBACK</button>
<div id="fb-modal">
  <div id="fb-box">
    <h3>문제 / 개선 제안</h3>
    <textarea id="fb-issue" placeholder="어떤 문제가 있었나요?"></textarea>
    <select id="fb-cat">
      <option value="bug">버그</option>
      <option value="quality">품질 개선</option>
      <option value="feature">기능 요청</option>
    </select>
    <div class="fb-row">
      <button class="fb-btn-s" id="fb-cancel">취소</button>
      <button class="fb-btn-s" id="fb-send">전송</button>
    </div>
    <div id="fb-done">전송 완료. 감사합니다!</div>
  </div>
</div>

<script>
// ─── 로딩 ───────────────────────────────────────────
(function(){
  const lines=[
    '> NOVA UNIVERSE v2.0 초기화 중...',
    '> AI 엔진 연결 중... [CLAUDE / GROQ / GEMINI]',
    '> 모듈 로드 중... [CONTENT / TAX / LAW / BOT]',
    '> 우주 공간 렌더링...',
    '> 시스템 준비 완료  ██████████  100%',
  ];
  const linesEl=document.getElementById('loader-lines');
  const barEl=document.getElementById('loader-bar');
  const loader=document.getElementById('loader');
  let idx=0;
  function next(){
    if(idx>=lines.length){
      setTimeout(()=>{
        loader.style.opacity='0';
        setTimeout(()=>{
          loader.style.display='none';
          document.getElementById('logo').style.opacity='1';
          document.getElementById('hint').style.opacity='1';
        },1200);
      },600);
      return;
    }
    const d=document.createElement('div');
    d.textContent=lines[idx];
    linesEl.appendChild(d);
    requestAnimationFrame(()=>d.style.opacity='1');
    idx++;
    barEl.style.width=(idx/lines.length*100)+'%';
    setTimeout(next, idx===lines.length ? 800 : 500);
  }
  setTimeout(next,500);
})();

// ─── 모듈 데이터 ─────────────────────────────────────
const MODULES=[
  {name:'CONTENT',  tag:'콘텐츠 자동화',  color:0xa78bfa,emissive:0x5b21b6,orbitA:22,orbitB:13, speed:0.22,phase:0,   size:1.1, url:'output/universe/index.html',desc:'AI 콘텐츠 자동 생성\nThreads·Instagram·YouTube 동시 발행'},
  {name:'TAX',      tag:'AI 세무사',       color:0xfbbf24,emissive:0x92400e,orbitA:30,orbitB:18, speed:0.16,phase:1.1, size:1.0, url:null,desc:'경비처리·부가세·종소세\n자동 계산 및 신고 보조'},
  {name:'LAW',      tag:'AI 변호사',       color:0xf87171,emissive:0xb91c1c,orbitA:39,orbitB:23, speed:0.12,phase:2.2, size:1.0, url:null,desc:'계약서 검토·내용증명\n분쟁 대응 자동화'},
  {name:'REPLY',    tag:'AI 댓글 답변',    color:0x34d399,emissive:0x065f46,orbitA:28,orbitB:17, speed:0.19,phase:3.3, size:0.95,url:null,desc:'리뷰·댓글 자동 답변\n브랜드 톤 유지'},
  {name:'BOOK',     tag:'AI 예약관리',     color:0x60a5fa,emissive:0x1d4ed8,orbitA:36,orbitB:21, speed:0.14,phase:4.4, size:0.95,url:null,desc:'예약·스케줄 자동 관리\n알림 자동 발송'},
  {name:'INVOICE',  tag:'AI 견적·계약',    color:0xe879f9,emissive:0x86198f,orbitA:45,orbitB:27, speed:0.10,phase:5.5, size:1.05,url:null,desc:'견적서·계약서 자동 생성\n서명·발송 자동화'},
  {name:'HR',       tag:'AI 채용',         color:0xfb923c,emissive:0x9a3412,orbitA:33,orbitB:19, speed:0.15,phase:0.8, size:0.95,url:null,desc:'채용공고·면접 질문 생성\n지원자 자동 분류'},
  {name:'TRANSLATE',tag:'AI 번역',         color:0x818cf8,emissive:0x3730a3,orbitA:43,orbitB:25, speed:0.11,phase:2.0, size:1.0, url:null,desc:'다국어 번역·현지화\n브랜드 톤 유지'},
  {name:'DESIGN',   tag:'AI 디자인',       color:0xf472b6,emissive:0xbe185d,orbitA:50,orbitB:29, speed:0.08,phase:3.5, size:1.05,url:null,desc:'썸네일·카드뉴스 자동 생성\nAI 이미지 프롬프트 최적화'},
  {name:'BOT',      tag:'AI 챗봇',         color:0x2dd4bf,emissive:0x0f766e,orbitA:35,orbitB:20, speed:0.13,phase:5.0, size:1.0, url:null,desc:'AI 챗봇 자동 제작\n24시간 고객 응대 자동화'},
];

// ─── Three.js ────────────────────────────────────────
const W=window.innerWidth, H=window.innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H);
renderer.setClearColor(0x000005,1);
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(72,W/H,0.1,5000);
camera.position.set(0,18,65);
camera.lookAt(0,0,0);

scene.add(new THREE.AmbientLight(0x080012,3));
const coreLight=new THREE.PointLight(0x6d28d9,4,200);
coreLight.position.set(0,0,0);
scene.add(coreLight);
const rimLight=new THREE.PointLight(0x4338ca,1.5,300);
rimLight.position.set(80,60,40);
scene.add(rimLight);

// ─── 별 텍스처 (부드러운 원형 점) ───────────────────
function makeStarTexture(){
  const size=64;
  const canvas=document.createElement('canvas');
  canvas.width=size;canvas.height=size;
  const ctx=canvas.getContext('2d');
  const grad=ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  grad.addColorStop(0,'rgba(255,255,255,1)');
  grad.addColorStop(0.25,'rgba(255,255,255,0.8)');
  grad.addColorStop(0.6,'rgba(255,255,255,0.1)');
  grad.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(canvas);
}
const starTex=makeStarTexture();

// ─── 별 레이어 3개 (원근감 + 깊이) ──────────────────
function makeStarLayer(count,radius,minR,maxR,brightness){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  const col=new Float32Array(count*3);
  const sizes=new Float32Array(count);
  for(let i=0;i<count;i++){
    const r=minR+Math.random()*(radius-minR);
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
    pos[i*3+2]=r*Math.cos(phi);
    // 별 색상: 90% 흰색/청백, 7% 노란빛, 3% 붉은빛
    const h=Math.random();
    const b=brightness*(0.5+Math.random()*0.5);
    if(h<0.6){col[i*3]=b;col[i*3+1]=b;col[i*3+2]=b;}
    else if(h<0.8){col[i*3]=b*.7;col[i*3+1]=b*.8;col[i*3+2]=b;}
    else if(h<0.93){col[i*3]=b;col[i*3+1]=b*.95;col[i*3+2]=b*.6;}
    else{col[i*3]=b;col[i*3+1]=b*.6;col[i*3+2]=b*.5;}
    sizes[i]=maxR*Math.random()*Math.random(); // 제곱분포 → 작은 별 많이
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));
  return geo;
}

// 쉐이더 재질 (크기 다양하게 + 원형 점)
const starVert=`
  attribute float size;
  varying vec3 vColor;
  void main(){
    vColor=color;
    vec4 mv=modelViewMatrix*vec4(position,1.0);
    gl_PointSize=size*(300.0/-mv.z);
    gl_Position=projectionMatrix*mv;
  }
`;
const starFrag=`
  varying vec3 vColor;
  void main(){
    vec2 uv=gl_PointCoord-vec2(0.5);
    float d=dot(uv,uv);
    if(d>0.25)discard;
    float alpha=smoothstep(0.25,0.0,d);
    gl_FragColor=vec4(vColor,alpha);
  }
`;

// 원거리 별 (20,000개, 300~2000)
const farGeo=makeStarLayer(20000,2000,300,2.2,0.75);
const farMat=new THREE.ShaderMaterial({vertexShader:starVert,fragmentShader:starFrag,
  vertexColors:true,transparent:true,depthWrite:false});
scene.add(new THREE.Points(farGeo,farMat));

// 중거리 별 (8,000개, 100~300)
const midGeo=makeStarLayer(8000,300,100,3.5,0.85);
const midMat=new THREE.ShaderMaterial({vertexShader:starVert,fragmentShader:starFrag,
  vertexColors:true,transparent:true,depthWrite:false});
scene.add(new THREE.Points(midGeo,midMat));

// 근거리 밝은 별 (1,500개, 60~100) — 크고 밝게
const nearGeo=makeStarLayer(1500,100,60,5.5,1.0);
const nearMat=new THREE.ShaderMaterial({vertexShader:starVert,fragmentShader:starFrag,
  vertexColors:true,transparent:true,depthWrite:false});
scene.add(new THREE.Points(nearGeo,nearMat));

// ─── 은하수 띠 ────────────────────────────────────────
(function(){
  const count=12000;
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  const col=new Float32Array(count*3);
  const sizes=new Float32Array(count);
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const band=(Math.random()-.5)*0.18; // 띠 두께
    const r=200+Math.random()*600;
    const scatter=(Math.random()-.5)*30;
    pos[i*3]=r*Math.cos(a);
    pos[i*3+1]=r*Math.sin(a)*Math.sin(band*5)+scatter*0.3;
    pos[i*3+2]=r*Math.sin(a);
    const b=0.08+Math.random()*0.22;
    col[i*3]=b*.6;col[i*3+1]=b*.55;col[i*3+2]=b;
    sizes[i]=0.8+Math.random()*1.2;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));
  const mat=new THREE.ShaderMaterial({vertexShader:starVert,fragmentShader:starFrag,
    vertexColors:true,transparent:true,depthWrite:false,opacity:0.5});
  const mw=new THREE.Points(geo,mat);
  mw.rotation.x=Math.PI/6;
  scene.add(mw);
})();

// ─── 성운 (네불라) ────────────────────────────────────
(function(){
  const count=18000;
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  const col=new Float32Array(count*3);
  const sizes=new Float32Array(count);
  // 두 개의 성운 덩어리
  const centers=[[80,20,-60],[-90,-30,50]];
  for(let i=0;i<count;i++){
    const ci=i<count/2?0:1;
    const cx=centers[ci][0],cy=centers[ci][1],cz=centers[ci][2];
    const r=15+Math.random()*55;
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);
    pos[i*3]=cx+r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1]=cy+r*Math.sin(phi)*Math.sin(theta);
    pos[i*3+2]=cz+r*Math.cos(phi);
    const b=0.04+Math.random()*0.18;
    if(ci===0){col[i*3]=b*.4;col[i*3+1]=b*.15;col[i*3+2]=b;}
    else{col[i*3]=b*.2;col[i*3+1]=b*.5;col[i*3+2]=b*.4;}
    sizes[i]=1.5+Math.random()*3;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));
  scene.add(new THREE.Points(geo,new THREE.ShaderMaterial({
    vertexShader:starVert,fragmentShader:starFrag,
    vertexColors:true,transparent:true,depthWrite:false})));
})();

// ─── 블랙홀 ──────────────────────────────────────────
const bh=new THREE.Mesh(new THREE.SphereGeometry(3.5,64,64),
  new THREE.MeshBasicMaterial({color:0x000000}));
scene.add(bh);
// 광환
[{r:5.2,t:0.6,o:0.18},{r:7,t:0.3,o:0.10},{r:9.5,t:0.2,o:0.06}].forEach(d=>{
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(d.r,32,32),
    new THREE.MeshBasicMaterial({color:0x6d28d9,transparent:true,opacity:d.o,side:THREE.BackSide})));
});
// 강착원반
const disk1=new THREE.Mesh(new THREE.TorusGeometry(7,0.6,16,200),
  new THREE.MeshBasicMaterial({color:0x7c3aed,transparent:true,opacity:0.55}));
disk1.rotation.x=Math.PI/2.3;scene.add(disk1);
const disk2=new THREE.Mesh(new THREE.TorusGeometry(10,0.3,12,200),
  new THREE.MeshBasicMaterial({color:0x4338ca,transparent:true,opacity:0.35}));
disk2.rotation.x=Math.PI/2.1;disk2.rotation.z=0.4;scene.add(disk2);
const disk3=new THREE.Mesh(new THREE.TorusGeometry(13,0.18,10,200),
  new THREE.MeshBasicMaterial({color:0x312e81,transparent:true,opacity:0.18}));
disk3.rotation.x=Math.PI/2.5;disk3.rotation.z=-0.3;scene.add(disk3);

// ─── 행성 + 궤도 ─────────────────────────────────────
const planetMeshes=[],planetAngles=[];
MODULES.forEach((m)=>{
  // 궤도 선
  const pts=[];
  for(let i=0;i<=180;i++){
    const a=(i/180)*Math.PI*2;
    pts.push(new THREE.Vector3(m.orbitA*Math.cos(a),0,m.orbitB*Math.sin(a)));
  }
  const oGeo=new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.Line(oGeo,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.03})));

  // 행성 본체
  const mesh=new THREE.Mesh(
    new THREE.SphereGeometry(m.size,32,32),
    new THREE.MeshPhongMaterial({color:m.color,emissive:m.emissive,emissiveIntensity:0.6,shininess:100})
  );
  scene.add(mesh);

  // 행성 글로우 (2겹)
  [1.8,2.8].forEach((s,i)=>{
    const g=new THREE.Mesh(
      new THREE.SphereGeometry(m.size*s,16,16),
      new THREE.MeshBasicMaterial({color:m.color,transparent:true,opacity:i===0?0.12:0.04,side:THREE.BackSide})
    );
    scene.add(g);
    if(i===0)mesh.userData.glow=g;
    if(i===1)mesh.userData.glow2=g;
  });

  mesh.userData.module=m;
  planetMeshes.push(mesh);
  planetAngles.push(m.phase);
});

// ─── 라벨 ────────────────────────────────────────────
const labels=MODULES.map(m=>{
  const div=document.createElement('div');
  div.className='planet-label';
  div.innerHTML=`<span class="name" style="color:#${m.color.toString(16).padStart(6,'0')}">${m.name}</span><span class="tag">${m.tag}</span>`;
  document.body.appendChild(div);
  return div;
});

// ─── OrbitControls ────────────────────────────────────
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.05;
controls.minDistance=20;
controls.maxDistance=800;
controls.autoRotate=false;

// ─── 행동 추적 ───────────────────────────────────────
const track=(action,target)=>fetch('/api/track',{method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({type:'interaction',action,target})}).catch(()=>{});
track('view','main');

// ─── 툴팁 + 클릭 ─────────────────────────────────────
const tooltip=document.getElementById('tooltip');
document.addEventListener('click',e=>{
  const el=e.target.closest('.planet-label');
  if(!el)return;
  e.stopPropagation();
  const idx=labels.indexOf(el);
  if(idx<0)return;
  const m=MODULES[idx];
  track('click',m.name);
  if(m.url){
    const warp=document.getElementById('warp');
    warp.style.opacity='1';
    setTimeout(()=>window.location.href=m.url,350);
  } else {
    document.getElementById('tooltip-name').textContent=m.name+' — '+m.tag;
    document.getElementById('tooltip-desc').textContent=m.desc;
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+18)+'px';
    tooltip.style.top=(e.clientY-8)+'px';
  }
});
document.addEventListener('click',e=>{
  if(!e.target.closest('.planet-label'))tooltip.style.display='none';
});
document.addEventListener('mousemove',e=>{
  if(!e.target.closest('.planet-label'))tooltip.style.display='none';
});

// ─── 라벨 위치 업데이트 ──────────────────────────────
function updateLabels(){
  planetMeshes.forEach((mesh,i)=>{
    const wp=new THREE.Vector3();
    mesh.getWorldPosition(wp);wp.project(camera);
    if(wp.z>1){labels[i].style.display='none';return;}
    labels[i].style.display='block';
    labels[i].style.left=((wp.x+1)/2*window.innerWidth)+'px';
    labels[i].style.top=((-wp.y+1)/2*window.innerHeight+MODULES[i].size*30+16)+'px';
  });
  // 유저 별 라벨
  if(window._userStar){
    const wp=new THREE.Vector3(window._userStar.x,window._userStar.y,window._userStar.z);
    wp.project(camera);
    if(wp.z>1){window._userStar.label.style.display='none';return;}
    window._userStar.label.style.display='block';
    window._userStar.label.style.left=((wp.x+1)/2*window.innerWidth)+'px';
    window._userStar.label.style.top=((-wp.y+1)/2*window.innerHeight+20)+'px';
  }
}

// ─── 리사이즈 ─────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ─── 애니메이션 ──────────────────────────────────────
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  // 행성 공전
  if(window._userStar && window._userOrbitAngle!==undefined){
    // 로그인: 유저 별이 중앙 공전
    window._userOrbitAngle+=0.15*0.008;
    const ux=28*Math.cos(window._userOrbitAngle);
    const uz=17*Math.sin(window._userOrbitAngle);
    window._userStar.mesh.position.set(ux,0,uz);
    window._userStar.glow.position.set(ux,0,uz);
    window._userStar.light.position.set(ux,0,uz);
    window._userStar.x=ux; window._userStar.y=0; window._userStar.z=uz;
    // 모듈들은 유저 별 주변 위성 공전
    MODULES.forEach((m,i)=>{
      planetAngles[i]+=m.speed*0.012;
      const x=ux+m.orbitA*0.28*Math.cos(planetAngles[i]);
      const z=uz+m.orbitB*0.28*Math.sin(planetAngles[i]);
      planetMeshes[i].position.set(x,0,z);
      planetMeshes[i].userData.glow.position.set(x,0,z);
      planetMeshes[i].userData.glow2.position.set(x,0,z);
      planetMeshes[i].rotation.y=t*0.3;
    });
  } else {
    // 비로그인: 모듈들이 중앙 공전 (기존)
    MODULES.forEach((m,i)=>{
      planetAngles[i]+=m.speed*0.008;
      const x=m.orbitA*Math.cos(planetAngles[i]);
      const z=m.orbitB*Math.sin(planetAngles[i]);
      planetMeshes[i].position.set(x,0,z);
      planetMeshes[i].userData.glow.position.set(x,0,z);
      planetMeshes[i].userData.glow2.position.set(x,0,z);
      planetMeshes[i].rotation.y=t*0.3;
    });
  }

  // 블랙홀
  disk1.rotation.z=t*0.5;
  disk2.rotation.z=-t*0.3;
  disk3.rotation.z=t*0.18;
  const pulse=1+Math.sin(t*1.2)*0.04;
  bh.scale.set(pulse,pulse,pulse);
  coreLight.intensity=3.5+Math.sin(t*1.8)*0.8;

  // 별 깜빡임 (근거리 별만)
  nearMat.opacity=0.88+Math.sin(t*0.7)*0.06;

  controls.update();

  // 유저 별 펄스
  if(window._userStar){
    const p=1+Math.sin(t*2.2)*0.18;
    window._userStar.mesh.scale.set(p,p,p);
    window._userStar.glow.scale.set(p,p,p);
    window._userStar.light.intensity=2+Math.sin(t*2.2)*0.9;
  }

  updateLabels();
  renderer.render(scene,camera);
}
animate();

// ─── ?ref= 초대 파라미터 캡처 ────────────────────────
(function(){
  const ref=new URLSearchParams(location.search).get('ref');
  if(ref) localStorage.setItem('nova_ref',ref);
})();

// ─── 유저 별 렌더링 ──────────────────────────────────
(function(){
  const panel=document.getElementById('user-panel');
  const raw=localStorage.getItem('nova_user');
  if(!raw){
    panel.innerHTML='<a href="/login.html" id="login-btn">LOGIN</a>';
    setTimeout(()=>panel.style.opacity='1',1500);
    return;
  }
  let user;
  try{user=JSON.parse(raw);}catch{return;}

  document.getElementById('user-nickname').textContent='✦ '+user.nickname;
  document.getElementById('invite-wrap').style.display='flex';
  const inviteLink=location.origin+'/?ref='+user.user_id;
  document.getElementById('invite-link').value=inviteLink;
  document.getElementById('copy-btn').onclick=function(){
    navigator.clipboard.writeText(inviteLink).then(()=>{
      this.textContent='COPIED!';
      setTimeout(()=>this.textContent='SHARE ✦',1500);
    });
  };

  // 궤도 초기 위상 (star_x 값으로 시작 위치 결정)
  const initPhase=((user.star_x||0)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  window._userOrbitAngle=initPhase;
  const ux=28*Math.cos(initPhase), uz=17*Math.sin(initPhase);

  const col=parseInt((user.star_color||'#ffffff').replace('#',''),16);
  const sSize=(user.star_size||1)*0.5;

  // 별 본체
  const mesh=new THREE.Mesh(
    new THREE.SphereGeometry(sSize,16,16),
    new THREE.MeshBasicMaterial({color:col})
  );
  mesh.position.set(ux,0,uz);
  scene.add(mesh);

  // 글로우
  const glow=new THREE.Mesh(
    new THREE.SphereGeometry(sSize*4,16,16),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.12,side:THREE.BackSide})
  );
  glow.position.set(ux,0,uz);
  scene.add(glow);

  // 포인트 라이트
  const light=new THREE.PointLight(col,2.5,30);
  light.position.set(ux,0,uz);
  scene.add(light);

  // 라벨
  const lbl=document.createElement('div');
  lbl.className='planet-label';
  lbl.style.cursor='default';
  lbl.style.pointerEvents='none';
  lbl.innerHTML=`<span class="name" style="color:#fff;font-size:.48rem">✦ ${user.nickname}</span><span class="tag">MY STAR</span>`;
  document.body.appendChild(lbl);

  window._userStar={mesh,glow,light,label:lbl,x:ux,y:0,z:uz};
  setTimeout(()=>panel.style.opacity='1',1500);
})();

// ─── 검색 기능 ───────────────────────────────────────
(function(){
  const wrap=document.getElementById('search-wrap');
  const input=document.getElementById('search-input');
  const msg=document.getElementById('search-msg');
  setTimeout(()=>wrap.style.opacity='1',2000);

  async function flyToUser(nickname){
    msg.textContent='탐색 중...';
    try{
      const res=await fetch('/api/search-user?nickname='+encodeURIComponent(nickname));
      const data=await res.json();
      if(!data||data.error){msg.textContent='별을 찾지 못했어요';setTimeout(()=>msg.textContent='',2000);return;}
      // 궤도 위치 계산
      const phase=((data.star_x||0)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
      const tx=28*Math.cos(phase), tz=17*Math.sin(phase);
      // 카메라 이동
      const startTarget=controls.target.clone();
      const endTarget=new THREE.Vector3(tx,0,tz);
      const startCam=camera.position.clone();
      const endCam=new THREE.Vector3(tx+15,8,tz+15);
      let p=0;
      (function fly(){
        p+=0.025;
        if(p>1)p=1;
        const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
        controls.target.lerpVectors(startTarget,endTarget,e);
        camera.position.lerpVectors(startCam,endCam,e);
        controls.update();
        if(p<1)requestAnimationFrame(fly);
      })();
      msg.textContent='✦ '+data.nickname;
      setTimeout(()=>msg.textContent='',3000);
    }catch{msg.textContent='오류 발생';setTimeout(()=>msg.textContent='',2000);}
  }

  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&input.value.trim()) flyToUser(input.value.trim());
  });
})();

// ─── 피드백 모달 ─────────────────────────────────────
const fbModal=document.getElementById('fb-modal');
document.getElementById('fb-btn').onclick=()=>fbModal.classList.add('open');
document.getElementById('fb-cancel').onclick=()=>fbModal.classList.remove('open');
document.getElementById('fb-send').onclick=async()=>{
  const issue=document.getElementById('fb-issue').value.trim();
  if(!issue)return;
  await fetch('/api/track',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({type:'feedback',issue,category:document.getElementById('fb-cat').value})});
  document.getElementById('fb-done').style.display='block';
  setTimeout(()=>{fbModal.classList.remove('open');
    document.getElementById('fb-issue').value='';
    document.getElementById('fb-done').style.display='none';},1500);
};
</script>
