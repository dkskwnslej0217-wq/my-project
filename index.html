<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA UNIVERSE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000005;font-family:'Orbitron',sans-serif}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}

/* 로딩 */
#loader{
  position:fixed;inset:0;z-index:200;background:#000005;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  transition:opacity 1.2s ease;
}
#loader-title{font-size:clamp(1.4rem,4vw,3rem);font-weight:900;letter-spacing:.3em;color:#fff;
  text-shadow:0 0 40px #6d28d9,0 0 80px #4338ca;}
#loader-sub{font-size:clamp(.4rem,.6vw,.6rem);letter-spacing:.6em;color:rgba(139,92,246,.4);margin-bottom:16px;}
#loader-lines{font-size:clamp(.4rem,.55vw,.56rem);letter-spacing:.2em;color:#8b5cf6;
  text-align:left;width:clamp(240px,35vw,360px);min-height:90px;line-height:2.1;}
#loader-lines div{opacity:0;transition:opacity .3s ease;}
#loader-bar-wrap{width:clamp(240px,35vw,360px);height:1px;background:rgba(139,92,246,.1);margin-top:8px;}
#loader-bar{height:100%;width:0%;background:linear-gradient(90deg,#4338ca,#8b5cf6,#c084fc);
  transition:width .35s ease;box-shadow:0 0 6px #7c3aed;}

/* 로고 — 좌상단 작게 */
#logo{
  position:fixed;top:20px;left:28px;z-index:20;pointer-events:none;
  opacity:0;transition:opacity 1s ease;
}
#logo-title{font-size:clamp(.7rem,1.1vw,.95rem);font-weight:900;letter-spacing:.25em;color:rgba(255,255,255,.75);
  text-shadow:0 0 20px #7c3aed;}
#logo-sub{font-size:clamp(.3rem,.42vw,.38rem);letter-spacing:.5em;color:rgba(139,92,246,.4);margin-top:2px;}

/* 플랫폼 레벨 진행바 */
#platform-level{
  margin-top:10px;opacity:0;transition:opacity 1s ease;
}
#plv-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
#plv-label{font-size:clamp(.55rem,.6vw,.65rem);letter-spacing:.2em;color:rgba(167,139,250,.75);}
#plv-badge{font-size:clamp(.52rem,.55vw,.58rem);letter-spacing:.15em;
  padding:.15rem .4rem;border-radius:4px;
  background:rgba(109,40,217,.2);border:1px solid rgba(139,92,246,.25);color:#c4b5fd;}
#plv-bar-wrap{width:clamp(120px,10vw,160px);height:2px;background:rgba(139,92,246,.1);border-radius:1px;}
#plv-bar{height:100%;width:0%;background:linear-gradient(90deg,#6d28d9,#a78bfa);
  border-radius:1px;transition:width .8s ease;box-shadow:0 0 4px #7c3aed;}
#plv-sub{font-size:clamp(.5rem,.52vw,.55rem);letter-spacing:.12em;color:rgba(167,139,250,.55);margin-top:3px;}

/* 힌트 — 하단 중앙 */
#hint{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:20;
  font-size:clamp(.62rem,.65vw,.72rem);letter-spacing:.25em;color:rgba(255,255,255,.45);
  pointer-events:none;opacity:0;transition:opacity 1s ease;
}

/* NOVA 센터 라벨 */
#nova-label{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:15;text-align:center;pointer-events:all;cursor:pointer;
  opacity:0;transition:opacity 1s ease;
}
#nova-name{font-size:clamp(.9rem,1.8vw,1.5rem);font-weight:900;letter-spacing:.4em;
  color:#fff;text-shadow:0 0 30px #8b5cf6,0 0 60px #6d28d9;
  font-family:'Orbitron',sans-serif;}
#nova-sub{font-size:clamp(.3rem,.5vw,.42rem);letter-spacing:.5em;
  color:rgba(167,139,250,.5);font-family:'Orbitron',sans-serif;margin-top:4px;}
#nova-label:hover #nova-name{text-shadow:0 0 40px #a78bfa,0 0 80px #8b5cf6,0 0 120px #6d28d9;}

/* 검색창 */
#search-wrap{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:20;
  display:flex;align-items:center;gap:8px;
  opacity:0;transition:opacity 1s ease;
}
#search-input{
  background:rgba(4,0,18,.88);border:1px solid rgba(139,92,246,.3);
  border-radius:20px;color:#fff;font-family:'Orbitron',sans-serif;
  font-size:.8rem;letter-spacing:.08em;padding:.45rem 1rem;
  outline:none;width:185px;transition:border-color .2s,width .3s;
}
#search-input:focus{border-color:rgba(139,92,246,.6);width:230px;}
#search-input::placeholder{color:rgba(255,255,255,.45);}
#search-msg{font-family:'Orbitron',sans-serif;font-size:.75rem;
  letter-spacing:.08em;color:rgba(167,139,250,.85);white-space:nowrap;}

/* 행성 라벨 */
.planet-label{
  position:fixed;pointer-events:all;z-index:5;
  transform:translate(-50%,-50%);text-align:center;cursor:pointer;
}
.planet-label .name{
  font-size:clamp(.75rem,.9vw,.95rem);font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  text-shadow:0 0 12px currentColor;display:block;
  font-family:'Orbitron',sans-serif;transition:text-shadow .2s;
}
.planet-label:hover .name{text-shadow:0 0 24px currentColor,0 0 40px currentColor;}
.planet-label .tag{
  font-size:clamp(.6rem,.65vw,.72rem);
  color:rgba(255,255,255,.55);letter-spacing:.08em;
  font-family:'Orbitron',sans-serif;margin-top:3px;display:block;
}

/* 툴팁 */
#tooltip{
  position:fixed;z-index:50;pointer-events:none;
  background:rgba(4,0,18,0.96);
  border:1px solid rgba(139,92,246,0.35);
  border-radius:12px;padding:.9rem 1.2rem;
  font-family:'Orbitron',sans-serif;max-width:220px;display:none;
  box-shadow:0 0 30px rgba(109,40,217,.2);
}
#tooltip-name{font-size:.9rem;font-weight:700;color:#fff;letter-spacing:.08em;margin-bottom:.4rem;}
#tooltip-desc{font-size:.8rem;color:rgba(196,181,253,.85);line-height:1.8;letter-spacing:.03em;}

/* 워프 */
#warp{position:fixed;inset:0;z-index:100;pointer-events:none;
  background:radial-gradient(ellipse at center,#6d28d9 0%,#000 60%);
  opacity:0;transition:opacity .2s;}

/* 유저 패널 — 우상단 */
#user-panel{
  position:fixed;top:20px;right:24px;z-index:20;
  display:flex;align-items:center;gap:10px;
  opacity:0;transition:opacity 1s ease;font-family:'Orbitron',sans-serif;
}
#user-nickname{font-size:clamp(.75rem,.85vw,.9rem);letter-spacing:.12em;color:rgba(255,255,255,.9);}
#invite-wrap{display:none;align-items:center;gap:6px;}
#invite-link{background:rgba(255,255,255,.05);border:1px solid rgba(139,92,246,.3);
  border-radius:6px;color:rgba(196,181,253,.8);font-family:'Orbitron',sans-serif;
  font-size:.72rem;letter-spacing:.06em;padding:.32rem .5rem;width:165px;outline:none;}
#copy-btn{background:rgba(109,40,217,.3);border:1px solid rgba(139,92,246,.4);
  color:#c4b5fd;font-family:'Orbitron',sans-serif;font-size:.72rem;letter-spacing:.08em;
  padding:.32rem .6rem;border-radius:6px;cursor:pointer;white-space:nowrap;transition:background .2s;}
#copy-btn:hover{background:rgba(109,40,217,.55);}
#login-btn{font-family:'Orbitron',sans-serif;font-size:.85rem;letter-spacing:.15em;
  color:#fff;text-decoration:none;
  background:linear-gradient(135deg,#5b21b6,#7c3aed);
  border:none;border-radius:8px;padding:.45rem 1.1rem;
  transition:opacity .2s;box-shadow:0 0 16px rgba(109,40,217,.4);}
#login-btn:hover{opacity:.85;}

/* ─── 바텀 네비 ──────────────────────────────────────── */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  display:flex;height:60px;
  background:rgba(0,0,10,.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(139,92,246,.3);
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;text-decoration:none;color:rgba(139,92,246,.55);
  font-family:'Orbitron',sans-serif;transition:color .2s;position:relative;
}
.bnav-item:hover{color:rgba(196,181,253,.9);}
.bnav-item.active{color:#fff;}
.bnav-item.active::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:32px;height:2px;background:#8b5cf6;border-radius:0 0 4px 4px;
  box-shadow:0 0 10px #8b5cf6;
}
.bnav-icon{font-size:1.2rem;line-height:1;}
.bnav-text{font-size:.62rem;letter-spacing:.1em;font-weight:700;}

/* 피드백 버튼 */
#fb-btn{
  position:fixed;bottom:80px;right:24px;z-index:50;
  background:rgba(4,0,18,.85);border:1px solid rgba(139,92,246,.35);
  color:rgba(167,139,250,.8);font-family:'Orbitron',sans-serif;
  font-size:.8rem;letter-spacing:.12em;padding:.5rem 1rem;
  border-radius:20px;cursor:pointer;pointer-events:all;
  transition:border-color .2s,color .2s;
}
#fb-btn:hover{border-color:#8b5cf6;color:#c4b5fd;}

/* 온보딩 모달 */
#onboard{display:none;position:fixed;inset:0;z-index:180;
  background:rgba(0,0,8,.88);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;}
#onboard.open{display:flex;}
#ob-box{
  width:min(92vw,420px);
  background:rgba(6,1,20,0.97);
  border:1px solid rgba(139,92,246,.3);
  border-radius:20px;padding:2.4rem 2rem 2rem;
  font-family:'Orbitron',sans-serif;position:relative;
}
#ob-step-dots{display:flex;gap:.45rem;justify-content:center;margin-bottom:1.6rem;}
.ob-dot{width:6px;height:6px;border-radius:50%;background:rgba(139,92,246,.25);transition:.3s;}
.ob-dot.active{background:#8b5cf6;box-shadow:0 0 8px #7c3aed;}
#ob-icon{font-size:2.2rem;text-align:center;margin-bottom:.9rem;}
#ob-title{font-size:1.3rem;font-weight:900;letter-spacing:.2em;color:#fff;
  text-align:center;margin-bottom:.7rem;text-shadow:0 0 20px #7c3aed;}
#ob-desc{font-size:.9rem;letter-spacing:.06em;color:rgba(196,181,253,.85);
  text-align:center;line-height:2;margin-bottom:1.8rem;}
#ob-next{
  width:100%;background:linear-gradient(135deg,#5b21b6,#7c3aed);
  border:none;border-radius:10px;color:#fff;
  font-family:'Orbitron',sans-serif;font-size:1rem;
  font-weight:700;letter-spacing:.12em;padding:.85rem;cursor:pointer;
  transition:opacity .2s;
}
#ob-next:hover{opacity:.85;}
#ob-skip{
  width:100%;background:none;border:none;
  color:rgba(167,139,250,.6);font-family:'Orbitron',sans-serif;
  font-size:.8rem;letter-spacing:.08em;cursor:pointer;
  padding:.5rem;margin-top:.4rem;
}
#ob-skip:hover{color:rgba(196,181,253,.9);}

/* 피드백 모달 */
#fb-modal{display:none;position:fixed;inset:0;z-index:150;
  background:rgba(0,0,5,.85);align-items:center;justify-content:center;}
#fb-modal.open{display:flex;}
#fb-box{background:#060112;border:1px solid rgba(139,92,246,.25);
  border-radius:14px;padding:2rem;width:min(90vw,360px);font-family:'Orbitron',sans-serif;}
#fb-box h3{font-size:1rem;letter-spacing:.15em;color:#fff;margin-bottom:1.2rem;}
#fb-issue{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(139,92,246,.3);
  border-radius:8px;color:#fff;font-family:'Orbitron',sans-serif;font-size:.85rem;
  letter-spacing:.04em;padding:.75rem;resize:none;height:90px;outline:none;margin-bottom:.7rem;}
#fb-cat{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(139,92,246,.3);
  border-radius:8px;color:#c4b5fd;font-family:'Orbitron',sans-serif;font-size:.85rem;
  letter-spacing:.04em;padding:.6rem;outline:none;margin-bottom:1.1rem;cursor:pointer;}
#fb-cat option{background:#060112;}
.fb-row{display:flex;gap:.6rem;}
.fb-btn-s{flex:1;padding:.6rem;border-radius:8px;font-family:'Orbitron',sans-serif;
  font-size:.85rem;letter-spacing:.08em;cursor:pointer;border:none;}
#fb-cancel{background:rgba(255,255,255,.06);color:rgba(167,139,250,.75);}
#fb-send{background:linear-gradient(135deg,#4338ca,#7c3aed);color:#fff;}
#fb-done{display:none;font-size:.85rem;letter-spacing:.08em;color:#c4b5fd;text-align:center;margin-top:.7rem;}
</style>
</head>
<body>

<div id="loader">
  <div id="loader-title">NOVA UNIVERSE</div>
  <div id="loader-sub">AI BUSINESS AUTOMATION</div>
  <div id="loader-lines"></div>
  <div id="loader-bar-wrap"><div id="loader-bar"></div></div>
</div>

<div id="warp"></div>

<div id="logo">
  <div id="logo-title">NOVA UNIVERSE</div>
  <div id="logo-sub">AI BUSINESS AUTOMATION</div>
  <div id="platform-level">
    <div id="plv-row">
      <span id="plv-label">PLATFORM</span>
      <span id="plv-badge">LV 1</span>
    </div>
    <div id="plv-bar-wrap"><div id="plv-bar"></div></div>
    <div id="plv-sub">다음 단계까지 — 명</div>
  </div>
</div>
<div id="nova-label">
  <div id="nova-name">NOVA</div>
  <div id="nova-sub">AI CORE</div>
</div>
<div id="hint">드래그로 우주를 탐험하세요</div>
<div id="search-wrap">
  <input id="search-input" type="text" placeholder="✦ 별 찾기..."/>
  <span id="search-msg"></span>
</div>

<div id="tooltip"><div id="tooltip-name"></div><div id="tooltip-desc"></div></div>

<div id="user-panel">
  <span id="user-nickname"></span>
  <div id="invite-wrap">
    <input id="invite-link" type="text" readonly/>
    <button id="copy-btn">SHARE ✦</button>
  </div>
  <button id="logout-btn" style="display:none;font-family:'Orbitron',sans-serif;font-size:.72rem;letter-spacing:.12em;color:rgba(167,139,250,.7);background:none;border:1px solid rgba(139,92,246,.3);border-radius:6px;padding:.3rem .6rem;cursor:pointer;transition:.2s;" onmouseover="this.style.color='#e9d5ff'" onmouseout="this.style.color='rgba(167,139,250,.7)'">LOGOUT</button>
</div>

<!-- 온보딩 모달 -->
<div id="onboard">
  <div id="ob-box">
    <div id="ob-step-dots">
      <div class="ob-dot active"></div>
      <div class="ob-dot"></div>
      <div class="ob-dot"></div>
      <div class="ob-dot"></div>
    </div>
    <div id="ob-icon"></div>
    <div id="ob-title"></div>
    <div id="ob-desc"></div>
    <button id="ob-next" onclick="obNext()">다음 →</button>
    <button id="ob-skip" onclick="obDone()">건너뛰기</button>
  </div>
</div>

<nav id="bottom-nav">
  <a href="/" class="bnav-item active"><span class="bnav-icon">✦</span><span class="bnav-text">UNIVERSE</span></a>
  <a href="/chat" class="bnav-item"><span class="bnav-icon">◎</span><span class="bnav-text">CHAT</span></a>
  <a href="/project" class="bnav-item"><span class="bnav-icon">⬡</span><span class="bnav-text">PROJECT</span></a>
  <a href="/budget" class="bnav-item"><span class="bnav-icon">◈</span><span class="bnav-text">BUDGET</span></a>
  <a href="/upgrade" class="bnav-item"><span class="bnav-icon">⬆</span><span class="bnav-text">UPGRADE</span></a>
</nav>

<button id="fb-btn">FEEDBACK</button>
<div id="fb-modal">
  <div id="fb-box">
    <h3>문제 / 개선 제안</h3>
    <textarea id="fb-issue" placeholder="어떤 문제가 있었나요?"></textarea>
    <select id="fb-cat">
      <option value="bug">버그</option>
      <option value="quality">품질 개선</option>
      <option value="feature">기능 요청</option>
    </select>
    <div class="fb-row">
      <button class="fb-btn-s" id="fb-cancel">취소</button>
      <button class="fb-btn-s" id="fb-send">전송</button>
    </div>
    <div id="fb-done">전송 완료. 감사합니다!</div>
  </div>
</div>

<script>
// ─── 로딩 ───────────────────────────────────────────
(function(){
  const lines=[
    '> NOVA UNIVERSE v2.0 초기화 중...',
    '> AI 엔진 연결 중... [CLAUDE / GROQ / GEMINI]',
    '> 모듈 로드 중... [CONTENT / TAX / LAW / BOT]',
    '> 우주 공간 렌더링...',
    '> 시스템 준비 완료  ██████████  100%',
  ];
  const linesEl=document.getElementById('loader-lines');
  const barEl=document.getElementById('loader-bar');
  const loader=document.getElementById('loader');
  let idx=0;
  function next(){
    if(idx>=lines.length){
      setTimeout(()=>{
        loader.style.opacity='0';
        setTimeout(()=>{
          loader.style.display='none';
          document.getElementById('logo').style.opacity='1';
          document.getElementById('hint').style.opacity='1';
          loadPlatformLevel();
        },1200);
      },600);
      return;
    }
    const d=document.createElement('div');
    d.textContent=lines[idx];
    linesEl.appendChild(d);
    requestAnimationFrame(()=>d.style.opacity='1');
    idx++;
    barEl.style.width=(idx/lines.length*100)+'%';
    setTimeout(next, idx===lines.length ? 800 : 500);
  }
  setTimeout(next,500);
})();

// ─── 모듈 데이터 ─────────────────────────────────────
const MODULES=[
  {name:'CONTENT',  tag:'콘텐츠 자동화',  color:0xa78bfa,emissive:0x5b21b6,orbitA:22,orbitB:13, speed:0.22,phase:0,   size:1.1, url:'output/universe/index.html',desc:'AI 콘텐츠 자동 생성\nThreads·Instagram·YouTube 동시 발행'},
  {name:'TAX',      tag:'AI 세무사',       color:0xfbbf24,emissive:0x92400e,orbitA:30,orbitB:18, speed:0.16,phase:1.1, size:1.0, url:null,desc:'경비처리·부가세·종소세\n자동 계산 및 신고 보조'},
  {name:'LAW',      tag:'AI 변호사',       color:0xf87171,emissive:0xb91c1c,orbitA:39,orbitB:23, speed:0.12,phase:2.2, size:1.0, url:null,desc:'계약서 검토·내용증명\n분쟁 대응 자동화'},
  {name:'REPLY',    tag:'AI 댓글 답변',    color:0x34d399,emissive:0x065f46,orbitA:28,orbitB:17, speed:0.19,phase:3.3, size:0.95,url:null,desc:'리뷰·댓글 자동 답변\n브랜드 톤 유지'},
  {name:'BOOK',     tag:'AI 예약관리',     color:0x60a5fa,emissive:0x1d4ed8,orbitA:36,orbitB:21, speed:0.14,phase:4.4, size:0.95,url:null,desc:'예약·스케줄 자동 관리\n알림 자동 발송'},
  {name:'INVOICE',  tag:'AI 견적·계약',    color:0xe879f9,emissive:0x86198f,orbitA:45,orbitB:27, speed:0.10,phase:5.5, size:1.05,url:null,desc:'견적서·계약서 자동 생성\n서명·발송 자동화'},
  {name:'HR',       tag:'AI 채용',         color:0xfb923c,emissive:0x9a3412,orbitA:33,orbitB:19, speed:0.15,phase:0.8, size:0.95,url:null,desc:'채용공고·면접 질문 생성\n지원자 자동 분류'},
  {name:'TRANSLATE',tag:'AI 번역',         color:0x818cf8,emissive:0x3730a3,orbitA:43,orbitB:25, speed:0.11,phase:2.0, size:1.0, url:null,desc:'다국어 번역·현지화\n브랜드 톤 유지'},
  {name:'DESIGN',   tag:'AI 디자인',       color:0xf472b6,emissive:0xbe185d,orbitA:50,orbitB:29, speed:0.08,phase:3.5, size:1.05,url:null,desc:'썸네일·카드뉴스 자동 생성\nAI 이미지 프롬프트 최적화'},

function makeStarTexture(){
  const size=64;
  const canvas=document.createElement('canvas');
  canvas.width=size;canvas.height=size;
  const ctx=canvas.getContext('2d');
  const grad=ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  grad.addColorStop(0,'rgba(255,255,255,1)');
  grad.addColorStop(0.25,'rgba(255,255,255,0.8)');
  grad.addColorStop(0.6,'rgba(255,255,255,0.1)');
  grad.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(canvas);
}
const starTex=makeStarTexture();

// ─── 별 레이어 3개 (원근감 + 깊이) ──────────────────
function makeStarLayer(count,radius,minR,maxR,brightness){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  const col=new Float32Array(count*3);
  const sizes=new Float32Array(count);
  for(let i=0;i<count;i++){
    const r=minR+Math.random()*(radius-minR);
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
    pos[i*3+2]=r*Math.cos(phi);
    // 별 색상: 90% 흰색/청백, 7% 노란빛, 3% 붉은빛
    const h=Math.random();
    const b=brightness*(0.5+Math.random()*0.5);
    if(h<0.6){col[i*3]=b;col[i*3+1]=b;col[i*3+2]=b;}
    else if(h<0.8){col[i*3]=b*.7;col[i*3+1]=b*.8;col[i*3+2]=b;}
    else if(h<0.93){col[i*3]=b;col[i*3+1]=b*.95;col[i*3+2]=b*.6;}
    else{col[i*3]=b;col[i*3+1]=b*.6;col[i*3+2]=b*.5;}
    sizes[i]=maxR*Math.random()*Math.random(); // 제곱분포 → 작은 별 많이
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));
  return geo;
}

// 쉐이더 재질 (크기 다양하게 + 원형 점)
const starVert=`
  attribute float size;
  varying vec3 vColor;
  void main(){
    vColor=color;
    vec4 mv=modelViewMatrix*vec4(position,1.0);
    gl_PointSize=size*(300.0/-mv.z);
    gl_Position=projectionMatrix*mv;
  }
`;
const starFrag=`
  varying vec3 vColor;
  void main(){
    vec2 uv=gl_PointCoord-vec2(0.5);
    float d=dot(uv,uv);
    if(d>0.25)discard;
    float alpha=smoothstep(0.25,0.0,d);
    gl_FragColor=vec4(vColor,alpha);
  }
`;

// 원거리 별 (20,000개, 300~2000)

(function(){

function updateLabels(){
  planetMeshes.forEach((mesh,i)=>{
    const wp=new THREE.Vector3();
    mesh.getWorldPosition(wp);wp.project(camera);
    if(wp.z>1){labels[i].style.display='none';return;}
    labels[i].style.display='block';
    labels[i].style.left=((wp.x+1)/2*window.innerWidth)+'px';
    labels[i].style.top=((-wp.y+1)/2*window.innerHeight+MODULES[i].size*30+16)+'px';
  });
  // 유저 별 라벨
  if(window._userStar){
    const wp=new THREE.Vector3(window._userStar.x,window._userStar.y,window._userStar.z);
    wp.project(camera);
    if(wp.z>1){window._userStar.label.style.display='none';}
    else{
      window._userStar.label.style.display='block';
      window._userStar.label.style.left=((wp.x+1)/2*window.innerWidth)+'px';
      window._userStar.label.style.top=((-wp.y+1)/2*window.innerHeight+20)+'px';
    }
  }
  // 다른 유저 별 라벨
  if(window._otherStars){
    window._otherStars.forEach(s=>{
      const wp=new THREE.Vector3(s.x,s.y,s.z);
      wp.project(camera);
      if(wp.z>1){s.label.style.display='none';return;}
      s.label.style.display='block';
      s.label.style.left=((wp.x+1)/2*window.innerWidth)+'px';
      s.label.style.top=((-wp.y+1)/2*window.innerHeight+14)+'px';
    });
  }
}

// ─── 애니메이션 ──────────────────────────────────────
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  // 행성 공전
  if(window._userStar && window._userOrbitAngle!==undefined){
    // 로그인: 유저 별이 중앙 공전
    window._userOrbitAngle+=0.15*0.008;
    const ux=28*Math.cos(window._userOrbitAngle);
    const uz=17*Math.sin(window._userOrbitAngle);
    window._userStar.mesh.position.set(ux,0,uz);
    window._userStar.glow.position.set(ux,0,uz);
    window._userStar.light.position.set(ux,0,uz);
    window._userStar.x=ux; window._userStar.y=0; window._userStar.z=uz;
    // 모듈들은 유저 별 주변 위성 공전
    MODULES.forEach((m,i)=>{
      planetAngles[i]+=m.speed*0.012;
      const x=ux+m.orbitA*0.28*Math.cos(planetAngles[i]);
      const z=uz+m.orbitB*0.28*Math.sin(planetAngles[i]);
      planetMeshes[i].position.set(x,0,z);
      planetMeshes[i].userData.glow.position.set(x,0,z);
      planetMeshes[i].userData.glow2.position.set(x,0,z);
      planetMeshes[i].rotation.y=t*0.3;
    });
  } else {
    // 비로그인: 모듈들이 중앙 공전 (기존)
    MODULES.forEach((m,i)=>{
      planetAngles[i]+=m.speed*0.008;
      const x=m.orbitA*Math.cos(planetAngles[i]);
      const z=m.orbitB*Math.sin(planetAngles[i]);
      planetMeshes[i].position.set(x,0,z);
      planetMeshes[i].userData.glow.position.set(x,0,z);
      planetMeshes[i].userData.glow2.position.set(x,0,z);
      planetMeshes[i].rotation.y=t*0.3;
    });
  }

  // NOVA 코어 애니메이션
  disk1.rotation.z=t*0.5;
  disk2.rotation.z=-t*0.3;
  disk3.rotation.z=t*0.18;
  const pulse=1+Math.sin(t*1.4)*0.06;
  novaCore.scale.set(pulse,pulse,pulse);
  novaGlows[0].scale.set(1+Math.sin(t*1.2)*0.04,1+Math.sin(t*1.2)*0.04,1+Math.sin(t*1.2)*0.04);
  coreLight.intensity=3.5+Math.sin(t*1.8)*0.8;
  novaLight.intensity=4+Math.sin(t*2.1)*1.5;

  // 별 깜빡임 (근거리 별만)
  nearMat.opacity=0.88+Math.sin(t*0.7)*0.06;

  controls.update();

  // 유저 별 펄스
  if(window._userStar){
    const p=1+Math.sin(t*2.2)*0.18;
    window._userStar.mesh.scale.set(p,p,p);
    window._userStar.glow.scale.set(p,p,p);
    window._userStar.light.intensity=2+Math.sin(t*2.2)*0.9;
  }

  updateLabels();
  renderer.render(scene,camera);
}
animate();

window._otherStars=[];
(async function(){
  const raw=localStorage.getItem('nova_user');
  let myId=null;
  try{myId=raw?JSON.parse(raw).user_id:null;}catch{}
  try{
    const res=await fetch('/api/users');
    if(!res.ok)return;
    const users=await res.json();
    users.forEach(u=>{
      if(u.user_id===myId)return;
      const phase=((u.star_x||0)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
      const ux=28*Math.cos(phase), uz=17*Math.sin(phase);
      const col=parseInt((u.star_color||'#ffffff').replace('#',''),16);
      const sSize=(u.star_size||1)*0.28;
      const mesh=new THREE.Mesh(
        new THREE.SphereGeometry(sSize,12,12),
        new THREE.MeshBasicMaterial({color:col})
      );
      mesh.position.set(ux,0,uz);
      scene.add(mesh);
      const glow=new THREE.Mesh(
        new THREE.SphereGeometry(sSize*3,12,12),
        new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.09,side:THREE.BackSide})
      );
      glow.position.set(ux,0,uz);
      scene.add(glow);
      const colorHex='#'+col.toString(16).padStart(6,'0');
      const lbl=document.createElement('div');
      lbl.className='planet-label';
      lbl.style.cursor='pointer';
      lbl.innerHTML=`<span class="name" style="color:${colorHex}">✦ ${u.nickname}</span>`;
      document.body.appendChild(lbl);
      lbl.onclick=()=>{location.href='/chat?id='+u.user_id;};
      window._otherStars.push({mesh,glow,label:lbl,x:ux,y:0,z:uz});
    });
  }catch{}
})();

// ─── 검색 기능 ───────────────────────────────────────
(function(){
  const wrap=document.getElementById('search-wrap');
  const input=document.getElementById('search-input');
  const msg=document.getElementById('search-msg');
  setTimeout(()=>wrap.style.opacity='1',2000);

  async function flyToUser(nickname){
    msg.textContent='탐색 중...';
    try{
      const res=await fetch('/api/search-user?nickname='+encodeURIComponent(nickname));
      const data=await res.json();
      if(!data||data.error){msg.textContent='별을 찾지 못했어요';setTimeout(()=>msg.textContent='',2000);return;}
      // 궤도 위치 계산
      const phase=((data.star_x||0)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
      const tx=28*Math.cos(phase), tz=17*Math.sin(phase);
      // 카메라 이동
      const startTarget=controls.target.clone();
      const endTarget=new THREE.Vector3(tx,0,tz);
      const startCam=camera.position.clone();
      const endCam=new THREE.Vector3(tx+15,8,tz+15);
      let p=0;
      (function fly(){
        p+=0.025;
        if(p>1)p=1;
        const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
        controls.target.lerpVectors(startTarget,endTarget,e);
        camera.position.lerpVectors(startCam,endCam,e);
        controls.update();
        if(p<1)requestAnimationFrame(fly);
      })();
      msg.textContent='✦ '+data.nickname;
      setTimeout(()=>msg.textContent='',3000);
    }catch{msg.textContent='오류 발생';setTimeout(()=>msg.textContent='',2000);}
  }

  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&input.value.trim()) flyToUser(input.value.trim());
  });
})();

// ─── 온보딩 ──────────────────────────────────────────
const OB_STEPS=[
  {icon:'✦',  title:'당신의 별이 탄생했습니다',  type:'info',
   desc:'NOVA UNIVERSE에 오신 걸 환영합니다.\n이 별은 당신만의 공간입니다.'},
  {icon:'💬', title:'NOVA와 대화하세요',          type:'info',
   desc:'별을 클릭하면 AI 어시스턴트 NOVA와\n1:1 대화를 시작할 수 있어요.'},
  {icon:'🌟', title:'초대하면 별이 성장해요',      type:'info',
   desc:'초대 링크로 친구를 데려올수록\n당신의 별이 커지고 밝아집니다.'},
  {icon:'🚀', title:'어떤 걸 해결하고 싶으세요?', type:'input',
   desc:'자유롭게 말씀해주세요. NOVA가 프로젝트를 만들어드려요.'},
];
let obStep=0;
function obRender(){
  const s=OB_STEPS[obStep];
  document.getElementById('ob-icon').textContent=s.icon;
  document.getElementById('ob-title').textContent=s.title;
  document.getElementById('ob-desc').textContent=s.desc;
  const isLast=obStep===OB_STEPS.length-1;
  // 마지막 스텝: 입력 필드 표시
  let inputHtml='';
  if(s.type==='input'){
    inputHtml=`<textarea id="ob-problem" placeholder="예: 매주 경쟁사 가격 체크가 귀찮아요&#10;예: 고객 문의에 매번 같은 답변을 해야 해요" style="width:100%;margin-bottom:.8rem;background:rgba(255,255,255,.05);border:1px solid rgba(139,92,246,.25);border-radius:8px;color:#fff;font-family:Orbitron,sans-serif;font-size:.44rem;letter-spacing:.05em;padding:.6rem .8rem;outline:none;resize:none;min-height:70px;line-height:1.8;" rows="3"></textarea>
    <div id="ob-nova-reply" style="display:none;background:rgba(109,40,217,.12);border:1px solid rgba(139,92,246,.2);border-radius:8px;padding:.6rem .8rem;margin-bottom:.8rem;font-size:.4rem;letter-spacing:.06em;color:#e0d8ff;line-height:1.9;"></div>`;
  }
  const existing=document.getElementById('ob-input-area');
  if(existing)existing.remove();
  if(inputHtml){
    const div=document.createElement('div');div.id='ob-input-area';
    div.innerHTML=inputHtml;
    document.getElementById('ob-next').before(div);
  }
  document.getElementById('ob-next').textContent=isLast?'프로젝트 만들기 →':'다음 →';
  document.querySelectorAll('.ob-dot').forEach((d,i)=>d.classList.toggle('active',i===obStep));
}
async function obNext(){
  const s=OB_STEPS[obStep];
  if(s.type==='input'){
    const prob=document.getElementById('ob-problem')?.value?.trim();
    if(prob){
      const btn=document.getElementById('ob-next');
      btn.disabled=true;btn.textContent='분석 중...';
      try{
        const raw=localStorage.getItem('nova_user');
        const uid=raw?JSON.parse(raw).user_id:null;
        if(uid){
          const res=await fetch('/api/project',{method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({user_id:uid,description:prob})});
          const data=await res.json();
          if(data.project){
            const replyEl=document.getElementById('ob-nova-reply');
            replyEl.style.display='block';
            replyEl.textContent=`"${data.project.title}" 프로젝트 생성! ${data.cluster.label} 클러스터에 연결됐어요.`;
          }
        } else {
          // 비로그인: 가입 유도
          const replyEl=document.getElementById('ob-nova-reply');
          replyEl.style.display='block';
          replyEl.textContent='좋아요! 가입하면 NOVA가 이 문제를 위한 프로젝트를 바로 만들어드려요. 무료로 30번 사용 가능합니다.';
        }
      }catch{}
      btn.disabled=false;
      const raw=localStorage.getItem('nova_user');
      const isLoggedIn=raw&&JSON.parse(raw).user_id;
      if(isLoggedIn){btn.textContent='우주 탐험 시작 →';btn.onclick=obDone;}
      else{btn.textContent='무료로 시작하기 →';btn.onclick=()=>location.href='/login';}
      return;
    }
  }
  if(obStep<OB_STEPS.length-1){obStep++;obRender();}
  else obDone();
}
function obDone(){
  document.getElementById('onboard').classList.remove('open');
  localStorage.setItem('nova_onboarded','1');
}
// 신규 방문자 감지: onboarded 플래그 없으면 무조건 온보딩
(function(){
  if(localStorage.getItem('nova_onboarded'))return;
  obRender();
  setTimeout(()=>document.getElementById('onboard').classList.add('open'),2500);
})();

// ─── 플랫폼 레벨 진행바 ────────────────────────────────
async function loadPlatformLevel() {
  try {
    const res = await fetch('/api/platform');
    if (!res.ok) return;
    const d = await res.json();
    const el = document.getElementById('platform-level');
    const pct = d.next_goal ? Math.min(100, Math.round((d.user_count / d.next_goal) * 100)) : 100;
    document.getElementById('plv-badge').textContent = 'LV ' + d.level;
    document.getElementById('plv-bar').style.width = pct + '%';
    document.getElementById('plv-sub').textContent = d.remaining > 0
      ? `다음 단계까지 ${d.remaining}명`
      : '최고 레벨 달성';
    el.style.opacity = '1';
  } catch {}
}
