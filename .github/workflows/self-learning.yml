name: NOVA Self-Learning

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  analyze-and-learn:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 데이터 수집 및 Groq 분석
        id: analyze
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PIPELINE_SECRET: ${{ secrets.PIPELINE_SECRET }}
        run: node scripts/analyze.js

      - name: GitHub Issue 자동 생성 (승인된 경우만)
        if: steps.analyze.outputs.create_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleDateString('ko-KR');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nova-insight',
              state: 'open',
            });
            if (existing.data.some(i => i.title.includes(today))) return;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[${today}] NOVA 자동 분석 — 이탈위험 ${{ steps.analyze.outputs.churn_risk }}명`,
              body: `## 오늘의 NOVA 인사이트\n\n${{ steps.analyze.outputs.insights }}\n\n---\n> 자동 생성 by NOVA Self-Learning`,
              labels: ['nova-insight'],
            });

      - name: Telegram 리포트
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          INSIGHTS: ${{ steps.analyze.outputs.insights }}
          TOTAL: ${{ steps.analyze.outputs.total_users }}
          ACTIVE: ${{ steps.analyze.outputs.active_today }}
          CONV: ${{ steps.analyze.outputs.conversion }}
          CHURN: ${{ steps.analyze.outputs.churn_risk }}
        run: |
          MSG="🧠 NOVA 자가학습 리포트%0A%0A"
          MSG="${MSG}👥 유저 ${TOTAL}명 · 오늘 활성 ${ACTIVE}명%0A"
          MSG="${MSG}💰 전환율 ${CONV}%25%0A"
          MSG="${MSG}⚠️ 이탈위험 ${CHURN}명%0A%0A"
          MSG="${MSG}💡 개선 인사이트%0A${INSIGHTS}"

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}" \
            -d "parse_mode=HTML"
