name: NOVA 영상 파이프라인

on:
  repository_dispatch:
    types: [create-video]
  workflow_dispatch:
    inputs:
      text:
        description: '영상 스크립트 텍스트'
        required: true
        default: 'NOVA AI가 만든 자동화 영상입니다.'
      title:
        description: '영상 제목'
        required: true
        default: 'NOVA 테스트 영상'
      tags:
        description: '태그 (쉼표 구분)'
        default: 'NOVA,AI,자동화'

jobs:
  make-video:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: FFmpeg 설치
        run: sudo apt-get install -y ffmpeg

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: googleapis 설치
        run: npm install googleapis node-fetch

      - name: 영상 생성 + 업로드
        run: node scripts/generate_video.js
        env:
          SCRIPT_TEXT: ${{ github.event.client_payload.text || inputs.text }}
          SCRIPT_TITLE: ${{ github.event.client_payload.title || inputs.title }}
          SCRIPT_TAGS: ${{ github.event.client_payload.tags || inputs.tags }}
          TTS_ENDPOINT: ${{ secrets.TTS_ENDPOINT }}
          PIPELINE_SECRET: ${{ secrets.PIPELINE_SECRET }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
