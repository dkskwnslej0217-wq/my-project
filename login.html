<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA UNIVERSE — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;background:#000005;font-family:'Orbitron',sans-serif;
  display:flex;align-items:center;justify-content:center;padding-bottom:60px;}

/* 별 배경 */
#bg{position:fixed;inset:0;z-index:0;}

/* 카드 */
#card{
  position:relative;z-index:10;
  width:min(90vw,380px);
  background:rgba(4,0,18,0.92);
  border:1px solid rgba(139,92,246,0.2);
  border-radius:18px;padding:2.4rem 2rem;
  box-shadow:0 0 60px rgba(109,40,217,0.12);
}
#card-logo{font-size:.7rem;font-weight:900;letter-spacing:.3em;color:rgba(255,255,255,.8);
  margin-bottom:.3rem;}
#card-title{font-size:1.2rem;font-weight:900;letter-spacing:.15em;color:#fff;margin-bottom:.3rem;
  text-shadow:0 0 20px #7c3aed;}
#card-sub{font-size:.42rem;letter-spacing:.25em;color:rgba(167,139,250,.7);margin-bottom:1.8rem;}

/* 탭 */
.tabs{display:flex;gap:.5rem;margin-bottom:1.4rem;}
.tab{flex:1;padding:.5rem;border-radius:8px;font-family:'Orbitron',sans-serif;
  font-size:.78rem;letter-spacing:.15em;cursor:pointer;border:1px solid rgba(139,92,246,.3);
  background:transparent;color:rgba(167,139,250,.8);transition:.2s;}
.tab.active{background:rgba(109,40,217,.35);color:#e9d5ff;border-color:rgba(167,139,250,.6);}

/* 입력 */
.field{margin-bottom:.9rem;}
.field label{display:block;font-size:.72rem;letter-spacing:.2em;color:rgba(196,181,253,.85);margin-bottom:.4rem;}
.field input{
  width:100%;background:rgba(255,255,255,.07);
  border:1px solid rgba(139,92,246,.35);border-radius:8px;
  color:#fff;font-family:'Orbitron',sans-serif;font-size:.56rem;
  letter-spacing:.08em;padding:.65rem .8rem;outline:none;
  transition:border-color .2s;
}
.field input:focus{border-color:rgba(167,139,250,.8);background:rgba(255,255,255,.1);}
.field input::placeholder{color:rgba(255,255,255,.3);}

/* 버튼 */
#submit-btn{
  width:100%;padding:.7rem;border-radius:10px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#4338ca,#7c3aed);
  color:#fff;font-family:'Orbitron',sans-serif;
  font-size:.85rem;letter-spacing:.2em;
  margin-top:.4rem;transition:opacity .2s;
  box-shadow:0 0 20px rgba(109,40,217,.3);
}
#submit-btn:hover{opacity:.85;}
#submit-btn:disabled{opacity:.4;cursor:not-allowed;}

/* 메시지 */
#msg{font-size:.78rem;letter-spacing:.1em;text-align:center;margin-top:.9rem;min-height:1.2rem;}
.msg-err{color:#f87171;}
.msg-ok{color:#34d399;}

/* 돌아가기 */
#back{display:block;text-align:center;margin-top:1.2rem;
  font-size:.72rem;letter-spacing:.2em;color:rgba(167,139,250,.7);
  text-decoration:none;transition:color .2s;}
#back:hover{color:#e9d5ff;}

/* ─── 바텀 네비 ──────────────────────────────────────── */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  display:flex;height:60px;
  background:rgba(0,0,10,.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(139,92,246,.3);
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;text-decoration:none;color:rgba(139,92,246,.55);
  font-family:'Orbitron',sans-serif;transition:color .2s;position:relative;
}
.bnav-item:hover{color:rgba(196,181,253,.9);}
.bnav-icon{font-size:1.2rem;line-height:1;}
.bnav-text{font-size:.62rem;letter-spacing:.1em;font-weight:700;}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<nav id="bottom-nav">
  <a href="/" class="bnav-item"><span class="bnav-icon">✦</span><span class="bnav-text">UNIVERSE</span></a>
  <a href="/chat" class="bnav-item"><span class="bnav-icon">◎</span><span class="bnav-text">CHAT</span></a>
  <a href="/project" class="bnav-item"><span class="bnav-icon">⬡</span><span class="bnav-text">PROJECT</span></a>
  <a href="/budget" class="bnav-item"><span class="bnav-icon">◈</span><span class="bnav-text">BUDGET</span></a>
  <a href="/upgrade" class="bnav-item"><span class="bnav-icon">⬆</span><span class="bnav-text">UPGRADE</span></a>
</nav>

<div id="card">
  <div id="card-logo">NOVA UNIVERSE</div>
  <div id="card-title">내 별을 만드세요</div>
  <div id="card-sub">AI BUSINESS AUTOMATION</div>

  <div class="tabs">
    <button class="tab active" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
    <button class="tab" id="tab-login" onclick="switchTab('login')">로그인</button>
    <button class="tab" id="tab-account" onclick="switchTab('account')" style="display:none">계정</button>
  </div>

  <div id="form-signup">
    <div class="field"><label>이메일</label><input id="s-email" type="email" placeholder="your@email.com"/></div>
    <div class="field"><label>닉네임 (별 이름)</label><input id="s-nick" type="text" placeholder="JUNHO" maxlength="16"/></div>
    <div class="field"><label>비밀번호</label><input id="s-pw" type="password" placeholder="8자 이상"/></div>
  </div>

  <!-- 이메일 인증 -->
  <div id="form-verify" style="display:none">
    <div style="text-align:center;margin-bottom:1.2rem;">
      <div style="font-size:.72rem;letter-spacing:.2em;color:rgba(196,181,253,.85);margin-bottom:.5rem;">인증 코드를 입력해주세요</div>
      <div id="verify-email-hint" style="font-size:.65rem;letter-spacing:.1em;color:rgba(167,139,250,.5);"></div>
    </div>
    <div class="field">
      <label>6자리 인증 코드</label>
      <input id="v-code" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="000000"
        style="text-align:center;font-size:1.4rem;letter-spacing:.5em;"/>
    </div>
    <div style="text-align:center;margin-top:.4rem;">
      <button onclick="resendCode()" id="resend-btn" style="background:none;border:none;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.15em;color:rgba(167,139,250,.5);">코드 재발송</button>
    </div>
  </div>

  <div id="form-login" style="display:none">
    <div class="field"><label>이메일</label><input id="l-email" type="email" placeholder="your@email.com"/></div>
    <div class="field"><label>비밀번호</label><input id="l-pw" type="password" placeholder="비밀번호"/></div>
  </div>

  <!-- 온보딩: 비즈니스 컨텍스트 -->
  <div id="form-onboard" style="display:none">
    <div style="font-size:.72rem;letter-spacing:.12em;color:rgba(196,181,253,.8);margin-bottom:.6rem;">내 비즈니스를 AI에게 알려주세요</div>
    <div style="font-size:.62rem;letter-spacing:.06em;color:rgba(167,139,250,.5);margin-bottom:.9rem;line-height:1.8;">한 번 저장하면 AI가 항상 내 맥락에서 답변합니다.<br>나중에 PROJECT 페이지에서 수정 가능합니다.</div>
    <textarea id="ob-biz" placeholder="예: 홍대 타투샵 운영, 주 고객 20-30대 여성, 인스타 팔로워 3천명&#10;예: 서울 강남 필라테스 스튜디오, 회원제, 1:1 PT 중심&#10;예: 유튜브 요리 채널 운영 중, 구독자 5천명" style="width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(139,92,246,.35);border-radius:8px;color:#fff;font-family:'Orbitron',sans-serif;font-size:.56rem;letter-spacing:.05em;padding:.65rem .8rem;outline:none;resize:none;min-height:90px;line-height:1.9;transition:border-color .2s;margin-bottom:.4rem;"></textarea>
    <button onclick="saveAndGoOnboard()" style="width:100%;padding:.7rem;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#4338ca,#7c3aed);color:#fff;font-family:'Orbitron',sans-serif;font-size:.85rem;letter-spacing:.2em;margin-top:.4rem;transition:opacity .2s;box-shadow:0 0 20px rgba(109,40,217,.3);">저장하고 시작하기</button>
    <button onclick="skipOnboard()" style="width:100%;background:none;border:none;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.15em;color:rgba(167,139,250,.45);padding:.3rem;margin-top:.2rem;">건너뛰기 →</button>
  </div>

  <div id="form-account" style="display:none">
    <div style="font-size:.78rem;letter-spacing:.1em;color:rgba(167,139,250,.6);margin-bottom:1rem;">비밀번호 변경</div>
    <div class="field"><label>현재 비밀번호</label><input id="a-cur" type="password" placeholder="현재 비밀번호"/></div>
    <div class="field"><label>새 비밀번호</label><input id="a-new" type="password" placeholder="8자 이상"/></div>
    <button onclick="changePw()" style="width:100%;padding:.6rem;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,#4338ca,#7c3aed);color:#fff;font-family:'Orbitron',sans-serif;font-size:.78rem;letter-spacing:.15em;margin-bottom:1.2rem;">비밀번호 변경</button>
    <div style="border-top:1px solid rgba(139,92,246,.15);padding-top:1.2rem;">
      <div style="font-size:.78rem;letter-spacing:.1em;color:rgba(248,113,113,.6);margin-bottom:.8rem;">회원 탈퇴</div>
      <div class="field"><label>비밀번호 확인</label><input id="a-del-pw" type="password" placeholder="비밀번호 입력"/></div>
      <button onclick="deleteAccount()" style="width:100%;padding:.6rem;border-radius:8px;border:none;cursor:pointer;background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);color:#f87171;font-family:'Orbitron',sans-serif;font-size:.78rem;letter-spacing:.15em;">탈퇴하기</button>
    </div>
  </div>

  <button id="submit-btn" onclick="submit()">우주로 진입하기</button>
  <div id="msg"></div>
  <div style="text-align:center;margin-top:.8rem;font-size:.68rem;letter-spacing:.06em;color:rgba(167,139,250,.4);">
    가입 시 <a href="/terms" target="_blank" style="color:rgba(167,139,250,.65);">이용약관</a> 및 <a href="/privacy" target="_blank" style="color:rgba(167,139,250,.65);">개인정보처리방침</a>에 동의합니다.
  </div>
  <div id="forgot-wrap" style="display:none;margin-top:.6rem;text-align:center;">
    <button onclick="showForgot()" style="background:none;border:none;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.15em;color:rgba(167,139,250,.6);">비밀번호를 잊으셨나요?</button>
  </div>
  <a href="/" id="back">← 우주로 돌아가기</a>
</div>

<!-- 비밀번호/이메일 찾기 모달 -->
<div id="forgot-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,5,.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;">
  <div style="background:rgba(4,0,18,.97);border:1px solid rgba(139,92,246,.3);border-radius:16px;padding:2rem;width:min(88vw,340px);">
    <!-- 탭 -->
    <div style="display:flex;gap:.4rem;margin-bottom:1.2rem;">
      <button id="ftab-pw" onclick="switchForgotTab('pw')" style="flex:1;padding:.4rem;border-radius:7px;font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.12em;cursor:pointer;border:1px solid rgba(139,92,246,.4);background:rgba(109,40,217,.35);color:#e9d5ff;">비밀번호 찾기</button>
      <button id="ftab-id" onclick="switchForgotTab('id')" style="flex:1;padding:.4rem;border-radius:7px;font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.12em;cursor:pointer;border:1px solid rgba(139,92,246,.25);background:transparent;color:rgba(167,139,250,.7);">이메일 찾기</button>
    </div>
    <!-- 비밀번호 찾기 -->
    <div id="fpanel-pw">
      <div class="field"><label>가입한 이메일</label><input id="f-email" type="email" placeholder="your@email.com"/></div>
      <button onclick="submitForgot()" id="forgot-btn" style="width:100%;padding:.65rem;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#4338ca,#7c3aed);color:#fff;font-family:'Orbitron',sans-serif;font-size:.78rem;letter-spacing:.2em;">임시 비밀번호 발송</button>
    </div>
    <!-- 이메일 찾기 -->
    <div id="fpanel-id" style="display:none;">
      <div class="field"><label>닉네임</label><input id="f-nick" type="text" placeholder="JUNHO" style="text-transform:uppercase;"/></div>
      <button onclick="submitFindId()" id="findid-btn" style="width:100%;padding:.65rem;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#4338ca,#7c3aed);color:#fff;font-family:'Orbitron',sans-serif;font-size:.78rem;letter-spacing:.2em;">이메일 확인</button>
    </div>
    <div id="forgot-msg" style="font-size:.72rem;letter-spacing:.1em;text-align:center;margin-top:.8rem;min-height:1rem;"></div>
    <button onclick="closeForgot()" style="display:block;margin:.8rem auto 0;background:none;border:none;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.15em;color:rgba(167,139,250,.5);">닫기</button>
  </div>
</div>

<script>
// ─── 별 배경 (간단) ──────────────────────────────────
(function(){
  const canvas=document.getElementById('bg');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const stars=Array.from({length:800},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height,
    r:Math.random()*1.2,a:Math.random()
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      s.a+=0.003*(Math.random()>.5?1:-1);
      s.a=Math.max(0.05,Math.min(0.9,s.a));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,160,255,${s.a})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ─── 탭 전환 ─────────────────────────────────────────
// 로그인 상태면 계정 탭 표시
(function(){
  const raw=localStorage.getItem('nova_user');
  const token=localStorage.getItem('nova_token');
  if(raw&&token){
    document.getElementById('tab-account').style.display='';
    switchTab('account');
  }
})();

let mode='signup';
let pendingVerifyUserId='';
let pendingUser=null;
function switchTab(t){
  mode=t;
  document.getElementById('form-signup').style.display=t==='signup'?'block':'none';
  document.getElementById('form-verify').style.display=t==='verify'?'block':'none';
  document.getElementById('form-login').style.display=t==='login'?'block':'none';
  document.getElementById('form-onboard').style.display=t==='onboard'?'block':'none';
  document.getElementById('form-account').style.display=t==='account'?'block':'none';
  document.getElementById('tab-signup').className='tab'+(t==='signup'?' active':'');
  document.getElementById('tab-login').className='tab'+(t==='login'?' active':'');
  document.getElementById('tab-account').className='tab'+(t==='account'?' active':'');
  const hideTabs=['onboard','verify','account'].includes(t);
  document.getElementById('tab-signup').style.display=hideTabs?'none':'';
  document.getElementById('tab-login').style.display=hideTabs?'none':'';
  document.getElementById('submit-btn').style.display=(t==='account'||t==='onboard')?'none':'block';
  if(t==='verify') document.getElementById('submit-btn').textContent='인증하기';
  else if(!['account','onboard'].includes(t)) document.getElementById('submit-btn').textContent=t==='signup'?'우주로 진입하기':'로그인';
  document.getElementById('msg').textContent='';
  document.getElementById('forgot-wrap').style.display=t==='login'?'block':'none';
}
async function resendCode(){
  const btn=document.getElementById('resend-btn');
  btn.disabled=true;btn.textContent='발송 중...';
  // 로그인 재시도로 코드 재발송
  const loginEmail=document.getElementById('l-email').value.trim()||document.getElementById('s-email').value.trim();
  const loginPw=document.getElementById('l-pw').value||document.getElementById('s-pw').value;
  if(loginEmail&&loginPw){
    await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:loginEmail,password:loginPw})}).catch(()=>{});
  }
  setTimeout(()=>{btn.disabled=false;btn.textContent='코드 재발송';},3000);
  msg('인증 코드를 재발송했습니다.','ok');
}

async function changePw(){
  const cur=document.getElementById('a-cur').value.trim();
  const nw=document.getElementById('a-new').value.trim();
  const msgEl=document.getElementById('msg');
  if(!cur||!nw){msgEl.textContent='모두 입력해주세요.';return;}
  const token=localStorage.getItem('nova_token');
  const res=await fetch('/api/account',{method:'PATCH',
    headers:{'Content-Type':'application/json','x-session-token':token||''},
    body:JSON.stringify({current_password:cur,new_password:nw})});
  const data=await res.json();
  msgEl.style.color=res.ok?'#34d399':'#f87171';
  msgEl.textContent=res.ok?'비밀번호가 변경됐습니다.':data.error||'오류가 발생했습니다.';
}

async function deleteAccount(){
  const pw=document.getElementById('a-del-pw').value.trim();
  const msgEl=document.getElementById('msg');
  if(!pw){msgEl.textContent='비밀번호를 입력해주세요.';return;}
  if(!confirm('정말 탈퇴하시겠습니까? 모든 데이터가 삭제됩니다.')){return;}
  const token=localStorage.getItem('nova_token');
  const res=await fetch('/api/account',{method:'DELETE',
    headers:{'Content-Type':'application/json','x-session-token':token||''},
    body:JSON.stringify({password:pw})});
  const data=await res.json();
  if(res.ok){
    localStorage.removeItem('nova_user');
    localStorage.removeItem('nova_token');
    location.href='/';
  } else {
    msgEl.style.color='#f87171';
    msgEl.textContent=data.error||'오류가 발생했습니다.';
  }
}

function switchForgotTab(t){
  document.getElementById('fpanel-pw').style.display=t==='pw'?'block':'none';
  document.getElementById('fpanel-id').style.display=t==='id'?'block':'none';
  document.getElementById('ftab-pw').style.background=t==='pw'?'rgba(109,40,217,.35)':'transparent';
  document.getElementById('ftab-pw').style.color=t==='pw'?'#e9d5ff':'rgba(167,139,250,.7)';
  document.getElementById('ftab-id').style.background=t==='id'?'rgba(109,40,217,.35)':'transparent';
  document.getElementById('ftab-id').style.color=t==='id'?'#e9d5ff':'rgba(167,139,250,.7)';
  document.getElementById('forgot-msg').textContent='';
}
function showForgot(){
  document.getElementById('forgot-modal').style.display='flex';
  document.getElementById('f-email').focus();
}
function closeForgot(){
  document.getElementById('forgot-modal').style.display='none';
  document.getElementById('forgot-msg').textContent='';
  document.getElementById('f-email').value='';
  document.getElementById('f-nick').value='';
}
async function submitFindId(){
  const btn=document.getElementById('findid-btn');
  const msgEl=document.getElementById('forgot-msg');
  const nick=document.getElementById('f-nick').value.trim().toUpperCase();
  if(!nick){msgEl.style.color='#f87171';msgEl.textContent='닉네임을 입력해주세요.';return;}
  btn.disabled=true;
  msgEl.style.color='rgba(167,139,250,.7)';msgEl.textContent='조회 중...';
  try{
    const res=await fetch('/api/find-email?nickname='+encodeURIComponent(nick));
    const data=await res.json();
    if(!res.ok){msgEl.style.color='#f87171';msgEl.textContent=data.error||'닉네임을 찾을 수 없습니다.';return;}
    msgEl.style.color='#34d399';msgEl.textContent='이메일: '+data.email;
  } catch {
    msgEl.style.color='#f87171';msgEl.textContent='오류가 발생했습니다.';
  } finally {btn.disabled=false;}
}
async function submitForgot(){
  const btn=document.getElementById('forgot-btn');
  const msgEl=document.getElementById('forgot-msg');
  const email=document.getElementById('f-email').value.trim();
  if(!email){msgEl.style.color='#f87171';msgEl.textContent='이메일을 입력해주세요.';return;}
  btn.disabled=true;
  msgEl.style.color='rgba(167,139,250,.7)';msgEl.textContent='전송 중...';
  try{
    const res=await fetch('/api/forgot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const data=await res.json();
    if(!res.ok){msgEl.style.color='#f87171';msgEl.textContent=data.error||'오류가 발생했습니다.';return;}
    msgEl.style.color='#34d399';
    msgEl.textContent='이메일을 확인해주세요. (스팸함도 확인)';
    document.getElementById('f-email').value='';
  } catch {
    msgEl.style.color='#f87171';msgEl.textContent='오류가 발생했습니다. 다시 시도해주세요.';
  } finally {btn.disabled=false;}
}

function msg(text,ok){
  const el=document.getElementById('msg');
  el.textContent=text;el.className=ok?'msg-ok':'msg-err';
}

// ─── 온보딩 ──────────────────────────────────────────
function _afterAuthRedirect(userId){
  if(redirectAfterLogin) location.href=redirectAfterLogin;
  else location.href='/?star='+(userId||'');
}

async function skipOnboard(){
  _afterAuthRedirect(pendingUser?.user_id);
}

async function saveAndGoOnboard(){
  const biz=document.getElementById('ob-biz').value.trim();
  const token=localStorage.getItem('nova_token');
  const userId=pendingUser?.user_id;
  if(biz&&token&&userId){
    try{
      await fetch('/api/profile?user_id='+encodeURIComponent(userId),{
        method:'PATCH',
        headers:{'Content-Type':'application/json','x-session-token':token},
        body:JSON.stringify({business_context:biz})
      });
    }catch{}
  }
  _afterAuthRedirect(userId);
}

// ─── URL 파라미터 ─────────────────────────────────────
const _params=new URLSearchParams(location.search);
const redirectAfterLogin=_params.get('redirect')||'';
const ref=_params.get('ref')||localStorage.getItem('nova_ref')||'';

// ─── 제출 ─────────────────────────────────────────────
async function submit(){
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;
  try{
    if(mode==='verify'){
      const code=document.getElementById('v-code').value.trim();
      if(!code||code.length!==6){msg('6자리 코드를 입력해주세요.');return;}
      const res=await fetch('/api/verify-email',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user_id:pendingVerifyUserId,code})});
      const data=await res.json();
      if(!res.ok){msg(data.error||'인증 실패');return;}
      localStorage.setItem('nova_user',JSON.stringify(data.user));
      if(data.token) localStorage.setItem('nova_token',data.token);
      localStorage.removeItem('nova_ref');
      pendingUser=data.user;
      msg('인증 완료!','ok');
      switchTab('onboard');
    } else if(mode==='signup'){
      const email=document.getElementById('s-email').value.trim();
      const nick=document.getElementById('s-nick').value.trim().toUpperCase();
      const pw=document.getElementById('s-pw').value;
      if(!email||!nick||!pw){msg('모든 항목을 입력해주세요.');return;}
      if(pw.length<8){msg('비밀번호는 8자 이상이어야 합니다.');return;}
      const res=await fetch('/api/signup',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,nickname:nick,password:pw,referrer_id:ref})});
      const data=await res.json();
      if(!res.ok){msg(data.error||'오류가 발생했습니다.');return;}
      // RESEND 없을 때 바로 토큰 발급
      if(!data.needs_verification && data.token){
        localStorage.setItem('nova_user',JSON.stringify(data.user));
        localStorage.setItem('nova_token',data.token);
        localStorage.removeItem('nova_ref');
        pendingUser=data.user;
        msg('가입 완료!','ok');
        switchTab('onboard');
        return;
      }
      pendingVerifyUserId=data.user_id;
      document.getElementById('verify-email-hint').textContent=email+'로 코드를 발송했습니다.';
      switchTab('verify');
      msg('이메일을 확인해주세요. (스팸함도 확인)','ok');
      document.getElementById('v-code').focus();
    } else {
      const email=document.getElementById('l-email').value.trim();
      const pw=document.getElementById('l-pw').value;
      if(!email||!pw){msg('이메일과 비밀번호를 입력해주세요.');return;}
      const res=await fetch('/api/login',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,password:pw})});
      const data=await res.json();
      if(!res.ok){msg(data.error||'로그인 실패');return;}
      if(data.needs_verification){
        pendingVerifyUserId=data.user_id;
        document.getElementById('verify-email-hint').textContent=data.email+'로 코드를 발송했습니다.';
        switchTab('verify');
        msg('이메일 인증이 필요합니다. 코드를 확인해주세요.','ok');
        document.getElementById('v-code').focus();
        return;
      }
      msg('로그인 완료!','ok');
      localStorage.setItem('nova_user',JSON.stringify(data.user));
      if(data.token) localStorage.setItem('nova_token',data.token);
      setTimeout(()=>_afterAuthRedirect(data.user.user_id),800);
    }
  } finally {btn.disabled=false;}
}

// 엔터키 (onboard/account 단계 제외)
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&mode!=='onboard'&&mode!=='account')submit();});
</script>
